  // 重要度でソートした受賞歴（シーズンタイトル→特別賞の順。オールスター等は除外済み）
  const AWARD_TOP = ['MVP', 'サイ・ヤング', '新人王', '首位打者', '本塁打王', '打点王', '盗塁王', '奪三振王',
                     '最優秀防御率', '最多勝', '最多セーブ', 'ゴールドグラブ', 'シルバースラッガー',
                     'ハンク・アーロン', 'ロベルト・クレメンテ', 'カムバック'];
  const awardsJaSorted = [...awardsJa].sort((a, b) => {
    const ai = AWARD_TOP.findIndex(t => a.includes(t));
    const bi = AWARD_TOP.findIndex(t => b.includes(t));
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });
  const opsN  = parseFloat(ops) || 0;
  const avgN  = parseFloat(avg) || 0;
  const obpN  = parseFloat(obp) || 0;

  // ── 通算カード判定（1シーズンでは不可能な試合数） ──
  const isCareerCard = !/^\d{4}$/.test(String(year).trim()) || games >= 170;

  if (isCareerCard) {
    // ── 通算カード向けコメント（最大5行） ──
    const lines = [];
    const span = !/^\d{4}$/.test(String(year).trim()) ? '通算' : `${games}試合`;

    // 行1: 主要スタッツ要約
    const sp = [];
    if (hr  > 0)  sp.push(`${hr}本塁打`);
    if (rbi > 0)  sp.push(`${rbi}打点`);
    sp.push(`打率${avg}`);
    if (sb  > 20) sp.push(`${sb}盗塁`);
    lines.push(`${span}で${sp.join('・')}・OPS${ops}を積み上げた、リーグを代表し続けた強打者。`);

    // 行2: 受賞歴 OR 主要マイルストーン
    if (awardsJa.length > 0) {
      lines.push(`${awardsJa.slice(0, 3).join('・')}など栄誉を手にし、時代を代表するスターとして球史に名を刻んだ。`);
    } else if (hr >= 500) {
      lines.push(`通算${hr}本塁打は球史に残る真の長距離砲の証明であり、偉業として永く語り継がれる。`);
    } else if (hr >= 300) {
      lines.push(`通算${hr}本塁打を積み上げ、本物のスラッガーとして長年にわたり打線の軸を担い続けた。`);
    } else if (sb >= 400) {
      lines.push(`通算${sb}盗塁という機動力で攻撃のダイナモとして輝き続け、相手バッテリーを翻弄した。`);
    } else if (obpN >= 0.390) {
      lines.push(`通算出塁率${obp}は選球眼と打撃技術の高さが本物であり続けた証で、打線の起点として機能した。`);
    } else if (opsN >= 0.900) {
      lines.push(`通算OPS${ops}はキャリアを通じて一線級打者だった証明で、対戦投手を常に苦しめ続けた。`);
    }

    // 行3: MLB歴代順位（最も上位の記録を1件のみ・具体的な順位を明記）
    const rankChecks = [
      { cat: 'hr',  val: hr,   ok: true,          fmt: r => `通算${hr}本塁打はMLB${_rankLabel(r)}の長打力で、球史に刻まれたホームランレジェンド。` },
      { cat: 'rbi', val: rbi,  ok: true,          fmt: r => `通算${rbi}打点はMLB${_rankLabel(r)}の打点記録であり、勝負強さをキャリア通じて証明した。` },
      { cat: 'sb',  val: sb,   ok: true,          fmt: r => `通算${sb}盗塁はMLB${_rankLabel(r)}の快足伝説で、機動力野球の象徴として球史に輝く。` },
      { cat: 'ops', val: opsN, ok: games >= 500,  fmt: r => `通算OPS${ops}はMLB${_rankLabel(r)}の最高峰打撃力であり、時代を超えた打者の格を示す数字。` },
      { cat: 'avg', val: avgN, ok: games >= 500,  fmt: r => `通算打率${avg}はMLB${_rankLabel(r)}の確実性で、どの時代でも首位打者級の精度を誇った。` },
    ];
    let topRank = null, topText = null;
    for (const c of rankChecks) {
      if (!c.ok) continue;
      const r = _mlbCareerRank(c.cat, c.val);
      if (r && (!topRank || r < topRank)) { topRank = r; topText = c.fmt(r); }
    }
    if (topText) lines.push(topText);

    // 行4: 異名（nickname）優先 → lore → OPS補足
    const nickH = getPlayerNickname(g_mlbNameEn);
    const loreH = getPlayerLore(g_mlbNameEn);
    if (nickH && lines.length < 5) {
      lines.push(nickH.line);
    } else if (loreH && lines.length < 5) {
      lines.push(loreH.ep);
    } else if (!topText && opsN >= 0.900 && lines.length < 5) {
      lines.push(`通算OPS${ops}はキャリアを通じて一線級打者だった証明で、対戦投手を常に苦しめ続けた。`);
    }

    // 最終行: 締め（常に1行）
    const closings = [
      `ファンに愛され、長年チームの顔として球団史に刻まれた不朽の名選手。`,
      `誰もが認める実力でチームを牽引し続けた、球団にとって誇りある功労者。`,
      `その打撃は時代を超えて語り継がれ、後進の選手たちへの道標となり続けている。`,
    ];
    lines.push(closings[hr % closings.length]);
    return lines.join('\n');
  }

  // ── シングルシーズン ──
  // 出場試合が少ない場合は極端な評価を抑制
  const isSparsePA = games > 0 && games < 30;

  // 複数ポジション（ユーティリティ）チェック
  const posLabels = ['C','1B','2B','3B','SS','LF','CF','RF'];
  const posJa = { C:'捕手', '1B':'一塁', '2B':'二塁', '3B':'三塁', SS:'遊撃', LF:'左翼', CF:'中堅', RF:'右翼' };
  const drsInn = [];
  for (let i = 0; i < 8; i++) {
    const inn = parseFloat(row[28 + i * 2]) || 0;
    if (inn > 0) drsInn.push({ pos: posLabels[i], inn });
  }
  const maxInn = drsInn.length > 0 ? Math.max(...drsInn.map(d => d.inn)) : 0;
  const multiPosList = drsInn.filter(d => maxInn > 0 && d.inn >= maxInn * 0.4);
  const isUtility = multiPosList.length >= 2;

  const lines = [];

  // 行1：主要成績（試合数少ない場合は注記）
  const p = [];
  if (hr > 0)  p.push(`${hr}本塁打`);
  if (rbi > 0) p.push(`${rbi}打点`);
  p.push(`打率${avg}`);
  if (sb > 5)  p.push(`${sb}盗塁`);
  if (isSparsePA) {
    lines.push(`${year}年、限られた出場機会の中で${p.join('・')}・OPS${ops}という数字を残した。`);
  } else {
    lines.push(`${year}年、${p.join('・')}・OPS${ops}という成績でシーズンを戦い抜いた。`);
  }

  // 行2：受賞歴 OR 特筆成績（確実なデータのみ使用・APIリーグ順位は使わない）
  if (!isSparsePA) {
    // 捕手専用: 盗塁阻止率No.1を受賞している場合は守備特記を優先表示
    if (g_isCatcher && awardsJaSorted.some(a => a.includes('盗塁阻止率'))) {
      const csRateDisp = parseFloat(row[54]);
      const leadDisp   = parseFloat(row[53]);
      const csStr  = !isNaN(csRateDisp) ? `盗塁阻止率${csRateDisp}%` : '盗塁阻止率';
      const ldStr  = !isNaN(leadDisp)   ? `リード${leadDisp}` : '';
      const suffix = ldStr ? `${ldStr}とともに、` : '';
      lines.push(`${csStr}はリーグNo.1の鉄壁守備で走者を封じ、${suffix}投手陣の柱として攻守両面でチームを牽引した。`);
    } else if (awardsJaSorted.length > 0) {
      lines.push(`${awardsJaSorted.slice(0,3).join('・')}を受賞し、リーグ最高の打者として名を刻んだシーズン。`);
    } else if (hr >= 50) {
      lines.push(`${hr}本塁打という圧倒的な長打力でリーグ全投手を震え上がらせた。`);
    } else if (opsN >= 1.10) {
      lines.push(`OPS${ops}はリーグ屈指の数字で、対戦投手が苦しめられ続けたシーズン。`);
    } else if (opsN >= 1.00) {
      lines.push(`OPS${ops}という傑出した数字で出塁と長打を高次元で両立させたシーズン。`);
    } else if (obpN >= 0.420) {
      lines.push(`出塁率${obp}の選球眼で塁上を賑わせ、得点圏での存在感は別格だった。`);
    } else if (sb >= 50) {
      lines.push(`${sb}盗塁と積極的な走塁でチームの攻撃に火をつけ、相手バッテリーを揺さぶり続けた。`);
    } else if (sb >= 30) {
      lines.push(`${sb}盗塁で相手バッテリーに的を絞らせず、攻撃のダイナモとして機能した。`);
    } else if (hr >= 40) {
      lines.push(`${hr}本塁打の長打力は相手投手の戦略を変えるほどで、本物の長距離砲として君臨した。`);
    } else if (rbi >= 120) {
      lines.push(`${rbi}打点という高い勝負強さでチームの得点源として絶対的な役割を果たした。`);
    } else if (avgN >= 0.340) {
      lines.push(`打率${avg}の確実性はリーグ随一で、どんな投手も抑えることができなかった。`);
    } else if (opsN >= 0.920) {
      lines.push(`出塁率・長打率ともにリーグ水準を大きく上回り、打線の核として機能したシーズン。`);
    }
  } else if (awardsJaSorted.length > 0) {
    lines.push(`${awardsJaSorted.slice(0,3).join('・')}を受賞し、リーグ最高の打者として名を刻んだシーズン。`);
  }

  // 行3：記録・スタイル（少出場時は省略）
  if (!isSparsePA) {
    // MLB単一シーズン最多安打記録（イチロー2004：262安打）
    if (hits >= 257) {
      lines.push(`シーズン${hits}安打を記録し、ジョージ・シスラーが1920年に樹立した257安打の${hits > 257 ? 'MLB新記録を更新。84年ぶりの快挙として球史に永遠に刻まれた' : '記録に並ぶ歴史的快挙'}。`);
    } else if (hr >= 73) {
      lines.push(`マーク・マグワイアの70本塁打記録を超え、MLB史上最多のシングルシーズン本塁打記録を樹立。`);
    } else if (hr >= 62) {
      lines.push(`ロジャー・マリスの61本塁打記録を打ち破り、MLB新記録を樹立した歴史的快挙。`);
    } else if (hr >= 60) {
      lines.push(`60本塁打の大台を超え、MLB史に刻まれる歴史的な長打力を世界に示した。`);
    } else if (obpN >= 0.480) {
      lines.push(`出塁率${obp}は敬遠を選ぶほど投手が恐れた証明で、歴代最高水準の数字。`);
    } else if (sb >= 50) {
      lines.push(`${sb}盗塁と長打力を兼ね備えた史上最高クラスの5ツールプレーヤー。`);
    } else if (isUtility) {
      const posStr = multiPosList.map(d => posJa[d.pos] || d.pos).join('・');
      lines.push(`${posStr}など複数ポジションを高水準でこなすユーティリティ性も光り、守備でも首脳陣の信頼を勝ち取った。`);
    } else if (avgN >= 0.350 && hr >= 20) {
      lines.push(`高打率と長打力を高次元で両立した、現代MLBでも稀有なコンタクト型スラッガー。`);
    } else if (avgN >= 0.340) {
      lines.push(`打率${avg}は現代MLB水準では突出した数字で、相手投手を攻略し続けた証明。`);
    } else if (hr >= 40) {
      lines.push(`${hr}本塁打の破壊力は相手投手の戦略を変えるほどで、本物の長距離砲として君臨。`);
    } else if (sb >= 30 && hr >= 20) {
      lines.push(`${hr}本塁打・${sb}盗塁の30-30を達成し、パワーとスピードを高次元で両立させた。`);
    } else if (opsN >= 0.900) {
      lines.push(`コンタクトと長打力のバランスで、どんな投手にも対応できる打撃の完成度を示した。`);
    } else if (avgN >= 0.300) {
      lines.push(`打率${avg}の確実性を軸に、チャンスで勝負強さを発揮し続けた。`);
    } else if (rbi >= 100) {
      lines.push(`${rbi}打点はチームの得点力を支えた原動力であり、クラッチ力の高さが光ったシーズン。`);
    } else {
      const styleLines = [
        `打線の軸として毎打席に威圧感を放ち、相手バッテリーの配球を左右し続けた存在だった。`,
        `選球眼と打撃技術を活かし、チームの得点源として欠かせない役割を担ったシーズン。`,
        `得点圏での勝負強さとコンタクト能力で、チームの攻撃をたびたび牽引した。`,
        `粘り強い打席での集中力と走塁センスで、チームに何度も好機をもたらした。`,
      ];
      lines.push(styleLines[(hr + rbi) % styleLines.length]);
    }
  }

  // 行4：lore OR 軌跡ストーリー OR 特筆補足（lines.length < 4 のときのみ）
  if (!isSparsePA && lines.length < 4) {
    const traj  = trajectory || {};
    const loreS = getPlayerLore(g_mlbNameEn);
    const nickS = getPlayerNickname(g_mlbNameEn);
    // ピーク年・受賞年・覚醒年は異名を優先して挿入
    const isNotableYear = traj.isPeakSeason || traj.isBreakthrough ||
      awardsJa.some(a => a.includes('MVP') || a.includes('サイ・ヤング') || a.includes('新人王') ||
                         a.includes('首位打者') || a.includes('本塁打王') || a.includes('打点王'));
    if (hr >= 60 && obpN >= 0.480) {
      lines.push(`出塁率${obp}も記録し、打者として全指標で頂点に立った歴史的シーズン。`);
    } else if (traj.isBreakthrough && traj.prevMetric != null) {
      lines.push(`前年OPS${traj.prevMetric.toFixed(3)}から大幅改善し、打撃が覚醒した転機のシーズン。`);
    } else if (traj.isImprovement && traj.prevMetric != null) {
      const diff = (traj.curMetric - traj.prevMetric).toFixed(3);
      lines.push(`前年比OPS+${diff}という急成長で、一流打者へと変貌を遂げたシーズン。`);
    } else if (traj.isPeakSeason && (traj.yearsInLeague ?? 0) > 1) {
      lines.push(`キャリアを通じてのベストシーズンであり、打者として真価を発揮した一年。`);
    } else if (sb >= 30 && hr >= 30 && !lines.some(l => l.includes('30-30'))) {
      lines.push(`30本塁打・30盗塁を同時達成し、パワーとスピードを高次元で両立させた。`);
    } else if (isNotableYear && nickS) {
      lines.push(nickS.line);
    } else if (loreS) {
      lines.push(loreS.ep);
    }
  }

  // 行5（最終）：総評
  if (!isSparsePA && (hr >= 70 || opsN >= 1.3)) {
    lines.push(`野球史上最高峰の打者の一人として、その活躍は永く語り継がれている。`);
  } else if (awardsJa.some(a => a.includes('MVP'))) {
    lines.push(`リーグ最高選手の称号を手にし、チームの核として球団史に刻まれた。`);
  } else if (isSparsePA) {
    lines.push(`限られた出場でも実力を見せつけ、次シーズンへの大きな期待を残した。`);
  } else {
    const closings = [
      `そのバットはファンに夢と興奮を与え続け、球場に何度も歓声をもたらした。`,
      `チームの勝利に貢献し続けた確かな実力と存在感は、ファンの記憶に深く刻まれた。`,
      `誰もが認めるパフォーマンスでチームを支え、球団にとって誇りある一年を刻んだ。`,
      `フィールドで発揮し続けた実力と熱さで、ファンとチームメイトの信頼を勝ち取った。`,
    ];
    lines.push(closings[(hr + sb) % closings.length]);
  }
  return lines.join('\n');
}

// ── 投手・列伝テキスト生成 ────────────────────────────────────
function buildPitcherRetsuden(row, year, awardsJa, apiSt, rankData = {}, trajectory = {}) {
  const wins = parseInt(apiSt.wins           ?? row[3])  || 0;
  const loss = parseInt(apiSt.losses         ?? row[4])  || 0;
  const era  = apiSt.era    || row[5]  || '--';
  const k    = parseInt(apiSt.strikeOuts     ?? row[15]) || 0;
  const whip = apiSt.whip   || row[17] || '--';
  const ip   = parseFloat(apiSt.inningsPitched ?? row[10]) || 0;
  const sv   = parseInt(apiSt.saves          ?? 0)        || 0;
  const gs   = parseInt(row[7])  || 0;
  const tg   = parseInt(row[6])  || 1;
  const isStarter = gs >= tg * 0.5;
  const hand  = String(row[57] || '').toUpperCase().includes('L') ? '左腕' : '右腕';
  const eraN  = parseFloat(era) || 99;
  const ctrl  = safeNum(row[51]) || 0;
  const strk  = safeNum(row[54]) || 0;

  // ── 通算カード判定（1シーズンで不可能な登板数・イニング数） ──
  const isCareerCard = !/^\d{4}$/.test(String(year).trim()) || tg >= 90 || ip >= 300;

  if (isCareerCard) {
    // ── 通算カード向けコメント（最大5行） ──
    const lines = [];
    const roleStr = isStarter ? '先発' : 'リリーフ';

    // 行1: 主要スタッツ要約
    const sp = [];
    if (tg   > 0) sp.push(`${tg}登板`);
    if (ip   > 0) sp.push(`${Math.floor(ip)}イニング`);
    if (wins > 0) sp.push(`${wins}勝`);
    if (sv   > 0) sp.push(`${sv}セーブ`);
    lines.push(`通算${sp.join('・')}・防御率${era}を記録した、${roleStr}の柱として時代を支えた名投手。`);

    // 行2: 受賞歴 OR 主要マイルストーン
    if (awardsJa.length > 0) {
      lines.push(`${awardsJa.slice(0, 3).join('・')}など栄誉を手にし、MLB投手史に名を刻んだ。`);
    } else if (k >= 3000) {
      lines.push(`通算${k}奪三振はMLB史に刻まれる偉業であり、世紀の奪三振マシンとして球史に燦然と輝く。`);
    } else if (wins >= 300) {
      lines.push(`通算${wins}勝は殿堂入り投手の証であり、長年にわたってローテーションの絶対的な柱であり続けた。`);
    } else if (k >= 2000) {
      lines.push(`通算${k}奪三振を積み上げた剛腕として、時代を超えて語り継がれる存在となった。`);
    } else if (wins >= 200) {
      lines.push(`通算${wins}勝でローテーションの軸として長年チームを支え、幾多の勝利を手繰り寄せた。`);
    } else if (sv >= 300) {
      lines.push(`通算${sv}セーブはクローザーとして球史に名を刻む偉業であり、守護神の証として輝き続ける。`);
    }

    // 行3: 防御率安定性（eraN < 3.50 かつ行数に余裕がある場合）
    if (eraN < 3.50 && lines.length < 3) {
      lines.push(`通算防御率${era}の安定感は打者にとって常に難攻不落の存在だった証であり、その精度は傑出していた。`);
    }

    // 行4: MLB歴代順位（最も上位の記録を1件のみ・具体的な順位を明記）
    const rankChecks = [
      { cat: 'k',    val: k,    fmt: r => `通算${k}奪三振はMLB${_rankLabel(r)}の記録で、球史に残る奪三振伝説として永く語り継がれる。` },
      { cat: 'wins', val: wins, fmt: r => `通算${wins}勝はMLB${_rankLabel(r)}の金字塔であり、長年マウンドで圧倒し続けた伝説の勝ち星。` },
      { cat: 'sv',   val: sv,   fmt: r => `通算${sv}セーブはMLB${_rankLabel(r)}の不滅の記録であり、クローザーとして球史に刻まれた守護神の証。` },
    ];
    let topRank = null, topText = null;
    for (const c of rankChecks) {
      const r = _mlbCareerRank(c.cat, c.val);
      if (r && (!topRank || r < topRank)) { topRank = r; topText = c.fmt(r); }
    }
    if (topText) lines.push(topText);

    // 異名（nickname）優先 → lore → 余白があれば追加
    const nickPC = getPlayerNickname(g_mlbNameEn);
    const lorePC = getPlayerLore(g_mlbNameEn);
    if (nickPC && lines.length < 5) {
      lines.push(nickPC.line);
    } else if (lorePC && lines.length < 5) {
      lines.push(lorePC.ep);
    }

    // 最終行: 締め（常に1行）
    const closings = [
      `長年にわたりマウンドに立ち続けた姿は、ファンにとって球団の象徴そのものだった。`,
      `チームの勝利を手繰り寄せ続けた投球は、後進の手本として今も語り継がれている。`,
      `その闘志と技術はチームメイトを鼓舞し、ファンに数え切れない感動をもたらした。`,
    ];
    lines.push(closings[wins % closings.length]);
    return lines.join('\n');
  }

  // ── シングルシーズン ──
  // 球種データを読み込む（row[58+i*3]=球速mph, row[59+i*3]=球威, row[60+i*3]=使用率）
  // 球種名はExcelヘッダーを優先（g_headers経由）
  const _pnDefaults = ['フォーシーム','スライダー','チェンジアップ','カーブ','カットボール','ツーシーム','スプリット'];
  const _hdr0 = (g_headers && g_headers[0]) ? g_headers[0] : [];
  const pitchNames = _pnDefaults.map((def, i) => {
    const h = _hdr0[58 + i * 3];
    return (h != null && String(h).trim()) ? String(h).trim() : def;
  });
  const pitches = [];
  for (let i = 0; i < 7; i++) {
    const spd  = parseFloat(row[58 + i * 3]);
    const pwr  = safeNum(row[59 + i * 3]) ?? 0;
    const rate = parseFloat(row[60 + i * 3]) || 0;
    if (rate > 0) pitches.push({
      name:  pitchNames[i],
      speed: (!isNaN(spd) && spd >= 60 && spd <= 105) ? spd : null,  // mphとして妥当な範囲のみ
      power: pwr,
      rate,
    });
  }
  pitches.sort((a, b) => b.rate - a.rate);
  const primaryPitch   = pitches[0] || null;
  const powerPitch     = pitches.length > 0 ? [...pitches].sort((a,b) => b.power - a.power)[0] : null;
  const hasRichArsenal = pitches.length >= 4;

  // 変化球異名マップ取得
  const nickMap = getPitchNicknames(g_mlbNameEn) || {};
  // 球種名に異名があれば「チェンジアップ（エアベンダー）」形式に変換するヘルパー
  const pName = p => nickMap[p.name] ? `${p.name}（${nickMap[p.name]}）` : p.name;

  // 球速テキスト生成ヘルパー（"最速98mph・"など）
  const spdTxt = s => (s !== null && s >= 60) ? `最速${Math.round(s)}mph・` : '';

  const lines = [];

  // 行1：主要成績
  const p = [];
  if (wins > 0) p.push(`${wins}勝${loss}敗`);
  p.push(`防御率${era}`);
  if (k > 0) p.push(`奪三振${k}`);
  if (sv > 0) p.push(`${sv}セーブ`);
  p.push(`WHIP${whip}`);
  const eraDesc = eraN < 2.5 ? '圧倒的な' : eraN < 3.5 ? '安定した' : '';
  lines.push(`${year}年、${p.join('・')}という${eraDesc}成績でマウンドに立ち続けた。`);

  // 行2：受賞歴 OR 特筆成績（確実なデータのみ使用・APIリーグ順位は使わない）
  {
    if (awardsJa.length > 0) {
      lines.push(`${awardsJa.slice(0,3).join('・')}を受賞し、リーグ最高の${isStarter ? '先発' : 'リリーフ'}投手として認められたシーズン。`);
    } else if (k >= 300) {
      lines.push(`${k}奪三振はリーグ記録に迫る歴史的数字で、打者を三振の山に沈め続けた。`);
    } else if (wins >= 25) {
      lines.push(`${wins}勝という偉業を達成し、ローテーションの頂点に君臨したシーズン。`);
    } else if (wins >= 20) {
      lines.push(`${wins}勝を達成し、ローテーションの絶対的な柱として全試合でチームに貢献した。`);
    } else if (eraN < 1.80 && ip >= 80) {
      lines.push(`防御率${era}は歴史的な低さで、登板するたびに打者を沈黙させた圧倒的なシーズン。`);
    } else if (eraN < 2.50 && ip >= 150) {
      lines.push(`防御率${era}・${Math.floor(ip)}イニングという安定感でチームを支え続けた信頼のエース。`);
    } else if (sv >= 45) {
      lines.push(`${sv}セーブという記録的な数字を打ち立て、球界最高のクローザーとして名を刻んだ。`);
    } else if (sv >= 40) {
      lines.push(`${sv}セーブを記録し、不動のクローザーとして終盤に絶対的な安心感をもたらした。`);
    } else if (sv >= 30) {
      lines.push(`${sv}セーブを積み上げ、緊張の終盤を幾度となく締めくくった守護神として君臨した。`);
    } else if (k >= 250) {
      lines.push(`${k}奪三振の圧倒的な三振奪取能力で、打者に対して常に優位に立ち続けた。`);
    } else if (eraN < 3.00 && wins >= 15) {
      lines.push(`防御率${era}・${wins}勝という安定した成績でローテーションの中心として機能した。`);
    } else if (ip >= 220) {
      lines.push(`${Math.floor(ip)}イニングを投げ抜くスタミナと安定感で、チームの勝利を積み上げ続けた。`);
    }
  }

  // 行3：球種・スタイル（球速付きで具体的に・数値は品質表現に変換）
  if (primaryPitch && powerPitch) {
    const sp = spdTxt(primaryPitch.speed);
    const sw = spdTxt(powerPitch.speed);
    if (primaryPitch.name !== powerPitch.name && powerPitch.power >= 85) {
      if (primaryPitch.rate >= 40) {
        lines.push(`${sp}${pName(primaryPitch)}を主軸に、${sw}${_pwrAdj(powerPitch.power)}${pName(powerPitch)}で打者を仕留めるスタイルが光った。`);
      } else {
        lines.push(`${sp}${pName(primaryPitch)}と${sw}${_pwrAdj(powerPitch.power)}${pName(powerPitch)}を組み合わせ、打者を翻弄し続けた。`);
      }
    } else if (primaryPitch.power >= 85) {
      lines.push(`${sp}${_pwrDesc(primaryPitch.power)}${pName(primaryPitch)}を主軸に、打者を力でねじ伏せた。`);
    } else if (hasRichArsenal) {
      const pitchList = pitches.slice(0, 3).map(q => `${spdTxt(q.speed)}${pName(q)}`).join('・');
      lines.push(`${pitchList}と多彩な球種で打者に球種を絞らせない完成度の高い投球スタイルが光った。`);
    } else {
      lines.push(`${sp}${pName(primaryPitch)}を軸に攻める投球で、打者を翻弄し続けた。`);
    }
  } else if (hasRichArsenal) {
    const pitchList = pitches.slice(0, 3).map(q => `${spdTxt(q.speed)}${pName(q)}`).join('・');
    lines.push(`${pitchList}と多彩な球種を操り、打者に球種を絞らせない完成度の高い投球スタイルが光った。`);
  } else if (!isStarter && (sv >= 20 || tg - gs >= 40)) {
    lines.push(`僅差の終盤に登場し試合を締める不動のクローザーとして、相手打線に恐れられた存在。`);
  } else if (ip >= 200) {
    lines.push(`${Math.floor(ip)}イニングを投げ抜くタフネスと制球・球威・緩急の三拍子が揃った万能型エース。`);
  } else if (ctrl >= 85 && strk >= 80) {
    lines.push(`制球力（${ctrl}）と奪三振能力（${strk}）を高次元で兼ね備え、あらゆる場面でゲームを支配した。`);
  } else if (ctrl >= 85) {
    lines.push(`精密な制球力（${ctrl}）で四球を出さず、打者に的を絞らせない投球でゲームを支配した。`);
  } else if (strk >= 85) {
    lines.push(`奪三振能力（${strk}）の高さで打者を圧倒し、三振の量産でチームに勢いをもたらした。`);
  } else {
    const styleLines = [
      `独自の投球術で打者のタイミングを外し続け、凡打の山を築いたシーズン。`,
      `制球と緩急を活かした頭脳的な投球で、長打を許さない安定感を発揮した。`,
      `マウンド上の冷静なゲームメイクとキャッチャーとの連携で、チームの勝利を手繰り寄せた。`,
    ];
    lines.push(styleLines[wins % styleLines.length]);
  }

  // 行4：軌跡ストーリー OR 異名 OR lore（lines.length < 4 のときのみ）
  if (lines.length < 4) {
    const traj   = trajectory || {};
    const lorePS = getPlayerLore(g_mlbNameEn);
    const nickPS = getPlayerNickname(g_mlbNameEn);
    // ピーク年・受賞年は異名を優先して挿入
    const isNotableYearP = traj.isPeakSeason || traj.isBreakthrough ||
      awardsJa.some(a => a.includes('サイ・ヤング') || a.includes('MVP') || a.includes('新人王') ||
                         a.includes('最優秀防御率') || a.includes('奪三振王') || a.includes('最多勝'));
    if (traj.isBreakthrough && traj.prevMetric != null) {
      lines.push(`前年防御率${traj.prevMetric.toFixed(2)}から大幅に改善し、制球力を磨き上げて覚醒した転機のシーズン。`);
    } else if (traj.isImprovement && traj.prevMetric != null) {
      const diff = (traj.prevMetric - traj.curMetric).toFixed(2);
      lines.push(`前年比ERA${diff}向上という急成長で、球界屈指のエースへと変貌を遂げたシーズン。`);
    } else if (traj.isPeakSeason && (traj.yearsInLeague ?? 0) > 1) {
      lines.push(`キャリアを通じてのベストシーズンであり、真のエースとして球界に君臨した一年。`);
    } else if (traj.isFirstYear) {
      lines.push(`メジャー${traj.yearsInLeague ? traj.yearsInLeague + '年目' : '初年度'}にして即戦力として台頭し、将来のエース候補として球界を驚かせた。`);
    } else if (isNotableYearP && nickPS) {
      lines.push(nickPS.line);
    } else if (lorePS) {
      lines.push(lorePS.ep);
    }
  }

  // 行5（最終）：締め
  if (awardsJa.some(a => a.includes('サイ・ヤング'))) {
    lines.push(`投手の最高栄誉サイ・ヤング賞を手にし、MLB投手史に燦然と名を刻んだ。`);
  } else if (k >= 300 || eraN < 2.0) {
    lines.push(`歴代屈指の投手としてその活躍はMLBの歴史に永く輝き続けるシーズン。`);
  } else {
    const closings = [
      `チームの大黒柱として勝利を手繰り寄せ、ファンに愛され続けたシーズン。`,
      `マウンド上の闘志と技術がチームを牽引し、勝利への確かな道筋を示し続けた。`,
      `その存在はチームにとって心強い柱であり、ファンを何度も沸かせた誇りある一年だった。`,
      `登板のたびにスタジアムを活気づけたその投球は、ファンの記憶に深く刻まれている。`,
    ];
    lines.push(closings[(wins + k) % closings.length]);
  }
  return lines.join('\n');
}

// ── MLB データから列伝全体を構築 ────────────────────────────
function buildRetsudenFromMLBData(row, mlbData, rankData = {}, trajectory = {}) {
  const year     = String(row[1] || '');
  const awards   = mlbData?.awards || [];
  const apiSt    = mlbData?.stats  || {};
  const awardsJa = awards.map(awardToJa).filter(Boolean);
  console.log('[MLB] 受賞（日本語）:', awardsJa);
  if (g_isPitcher) return buildPitcherRetsuden(row, year, awardsJa, apiSt, rankData, trajectory);
  return buildHitterRetsuden(row, year, awardsJa, apiSt, rankData, trajectory);
}

// ── 列伝を生成してカードに反映（APIキー不要） ─────────────────
async function fetchRetsudenFromAPI(row) {
  const yearKey = String(row[1] || '');
  const isCareer = !/^\d{4}$/.test(yearKey);

  // ① 通算行の場合：全キャリア受賞歴を一括取得して _awardsJaByYear に格納
  if (isCareer && g_mlbId) {
    await _fetchAndCacheAllAwards(g_mlbId);
  }

  // ② MLB Stats API からシーズン成績・受賞歴を取得
  let mlbData = { stats: {}, awards: [] };
  if (g_mlbId && row[1]) {
    console.log(`[MLB Stats API] ID=${g_mlbId} year=${row[1]} 取得中…`);
    mlbData = await fetchMlbSeasonData(g_mlbId, row[1], g_isPitcher);
    console.log('[MLB Stats API] 受賞数:', mlbData.awards.length, '/ stats keys:', Object.keys(mlbData.stats).length);
  }

  // ③ リーグ年度別ランキング取得（1位のみアワードとして使用）
  let rankData = {};
  if (g_mlbId && row[1] && /^\d{4}$/.test(yearKey)) {
    try {
      const { leagueId, leagueLabel } = getLeagueInfo(row[2]);
      const localStats = g_isPitcher
        ? { era: row[5], k: parseInt(row[15]) || null, wins: parseInt(row[3]) || null, whip: row[17] }
        : { avg: row[15], hr: parseInt(row[9]) || null, rbi: parseInt(row[10]) || null,
            ops: row[17], sb: getSB(row) };
      const leaders = await fetchLeagueLeaders(row[1], g_isPitcher, leagueId);
      rankData = buildRankData(leaders, g_mlbId, leagueLabel, localStats);
      _rankDataByYear[String(row[1])] = rankData;  // 年度別キャッシュに保存
      console.log('[LeagueLeaders] rankData:', JSON.stringify(rankData));
    } catch (e) {
      console.warn('[LeagueLeaders] 取得失敗:', e.message);
    }
  }

  // ③ 前年比較による軌跡分析（同期・g_dataRows 使用）
  const trajectory = analyzeCareerTrajectory(row);
  if (trajectory.isBreakthrough) console.log('[Trajectory] 覚醒シーズン検出');
  else if (trajectory.isImprovement) console.log('[Trajectory] 成長シーズン検出');
  else if (trajectory.isPeakSeason) console.log('[Trajectory] キャリアベスト検出');

  const retsuden = buildRetsudenFromMLBData(row, mlbData, rankData, trajectory);
  // MLB公式アワード + リーグリーダー1位タイトルをマージ（重複除去）
  const apiAwards   = (mlbData.awards || []).map(awardToJa).filter(Boolean);
  const rankAwards  = rankDataToAwards(rankData);
  const awardsJa    = [...new Set([...apiAwards, ...rankAwards])];
  if (rankAwards.length) console.log('[LeagueLeaders] 追加アワード:', rankAwards);

  // 捕手専用：盗塁阻止率が40%以上（単年）または37%以上（通算）はリーグNo.1タイトルとして追加
  // ※ league-leading の目安。ExcelのcsRate(row[54])を参照
  if (g_isCatcher) {
    const csRateVal  = parseFloat(row[54]);
    const isCareerRow = !/^\d{4}$/.test(String(row[1] ?? '').trim());
    const csThreshold = isCareerRow ? 37 : 40;
    if (!isNaN(csRateVal) && csRateVal >= csThreshold && !awardsJa.includes('盗塁阻止率No.1')) {
      awardsJa.push('盗塁阻止率No.1');
    }
  }

  const cardType  = buildCardType(row, awardsJa);

  // 年度別アワードキャッシュに保存（通算行は除外）
  if (!isCareer) _awardsJaByYear[yearKey] = awardsJa;

  // 変化球異名（投手のみ）
  const pitchNicknames = g_isPitcher ? (getPitchNicknames(g_mlbNameEn) || {}) : {};

  return { retsuden, cardType, pitchNicknames, awardsJa, isCareer };
}

// カード上のcardTypeラベルと変化球ニックネームを更新
function updateCardExtras(cardType, pitchNicknames, awardsJa, isCareer) {
  // 通算バナー再描画・テーマ再適用のために最新状態を保存
  g_lastAwardsJa   = awardsJa || [];
  g_lastIsCareer   = !!isCareer;
  g_lastCardExtras = { cardType, pitchNicknames, awardsJa: awardsJa || [], isCareer: !!isCareer };
  // ① 右上の肩書ラベルを更新
  if (cardType) {
    const el = document.querySelector('#card-root .card-type');
    if (el) el.textContent = cardType;
  }
  // ② 変化球ニックネームを球種名セルに追記
  // 球種名は通常フォント(12px)のまま、異名は次行に小さく黄色ボールドで表示
  if (pitchNicknames && typeof pitchNicknames === 'object') {
    Object.entries(pitchNicknames).forEach(([pitchName, nickname]) => {
      if (!nickname) return;
      document.querySelectorAll('#card-root td.pn[data-pitch]').forEach(td => {
        if (td.dataset.pitch === pitchName) {
          // 球種名と異名を同一行に横並びで表示（改行なし）
          // 球種名：12px / 異名（）：8.5px・黄色ボールド・同一行
          td.innerHTML =
            `<span style="font-size:12px;white-space:nowrap;">${escapeHtml(pitchName)}</span>` +
            `<span style="font-size:8.5px;color:#ffdd33;font-weight:900;` +
            `letter-spacing:0;white-space:nowrap;">（${escapeHtml(nickname)}）</span>`;
          td.style.setProperty('white-space',   'nowrap',  'important');
          td.style.setProperty('overflow',      'hidden',  'important');
          td.style.setProperty('text-overflow', 'ellipsis','important');
          td.style.setProperty('padding',       '1px 4px', 'important');
          td.style.removeProperty('font-size');
          td.style.removeProperty('letter-spacing');
          td.style.removeProperty('line-height');
        }
      });
    });
  }
  // ③ バナーのアワード略称を更新
  const bannerEl = document.querySelector('#card-root .banner-awards');
  _setBannerText(bannerEl, _bannerAwardsText(awardsJa || [], !!isCareer));

  // ④ タイトル加点（基本スコアが100未満の場合のみ）
  _applyTitleBonus(awardsJa || [], !!isCareer);
}

/**
 * バナーにテキストをセットし、幅に合わせてフォントサイズを自動縮小する共通処理。
 */
function _setBannerText(bannerEl, text) {
  if (!bannerEl) return;
  if (!text) {
    bannerEl.textContent = '';
    bannerEl.style.display = 'none';
    return;
  }
  bannerEl.textContent = `タイトル: ${text}`;
  bannerEl.style.display = '';
  bannerEl.style.fontSize = '';
  bannerEl.style.letterSpacing = '';
  requestAnimationFrame(() => {
    let fs = 13;
    bannerEl.style.fontSize = `${fs}px`;
    bannerEl.style.letterSpacing = '2px';
    while (bannerEl.scrollWidth > bannerEl.offsetWidth && fs > 8) {
      fs -= 0.5;
      bannerEl.style.fontSize = `${fs}px`;
      if (fs <= 11) bannerEl.style.letterSpacing = '1px';
      if (fs <= 9)  bannerEl.style.letterSpacing = '0.5px';
    }
  });
}

/**
 * 通算バナーを _rankDataByYear の最新内容で再描画する。
 * _enrichBackCrownsAsync 完了後に呼ぶことで、統計タイトルが即時反映される。
 */
function _refreshCareerBanner() {
  if (!g_lastIsCareer) return;
  const bannerEl = document.querySelector('#card-root .banner-awards');
  if (!bannerEl) return;
  const text = _bannerAwardsText(g_lastAwardsJa, true);
  _setBannerText(bannerEl, text);
  // 通算データが揃ったタイミングでタイトル加点も再適用（stars変化時はテーマ再描画も行う）
  _applyTitleBonus(g_lastAwardsJa, true);
}

/**
 * タイトル加点ボーナスを計算する。
 * 基本スコアが100以上の場合は加点しない。
 * 通算カードでは各タイトル種は複数受賞でも1回分のみカウント。
 */
function _calcTitleBonus(awardsJa, isCareer) {
  const BONUS_MAP = {
    MVP:5, WSMVP:3, LCSMVP:3, CY:5,
    ERA:2, K:2, W:2, SV:2, HLD:2,
    ROY:3, AVG:2, HR:2, RBI:2, SB:3,
    OPS:2, CSR:3, GG:2, SS:2,
    HAA:1, RC:1, CB:1,
  };
  let abbrs;
  if (isCareer) {
    // 通算: _awardsJaByYear の全アワード + _rankDataByYear のrank=1 を統合しタイプ別に重複除去
    const allAwards = Object.values(_awardsJaByYear).flat();
    const fromAwards = allAwards.map(a => _abbrevAward(a)).filter(Boolean);
    const rankKeyMap = { era:'ERA', k:'K', wins:'W', sv:'SV', hld:'HLD',
                         avg:'AVG', hr:'HR', rbi:'RBI', ops:'OPS', sb:'SB' };
    const fromRank = [];
    Object.values(_rankDataByYear).forEach(rd => {
      Object.entries(rankKeyMap).forEach(([key, abbr]) => {
        if (rd[key]?.rank === 1) fromRank.push(abbr);
      });
    });
    abbrs = [...new Set([...fromAwards, ...fromRank])];
  } else {
    // 単年: awardsJa をそのまま使用（同年で重複はないが念のため除去）
    abbrs = [...new Set(awardsJa.map(a => _abbrevAward(a)).filter(Boolean))];
  }
  const rawBonus = abbrs.reduce((sum, abbr) => sum + (BONUS_MAP[abbr] || 0), 0);
  // 通算カードは加点を半減（ROUND(÷2)）
  return isCareer ? Math.round(rawBonus / 2) : rawBonus;
}

/** スコア → 星数変換（_doGenerateと同じロジック） */
function _scoreToStars(score) {
  return score > 99 ? 6
       : score >= 90 ? 5
       : score >= 80 ? 4
       : score >= 70 ? 3
       : score >= 60 ? 2
       : score >= 50 ? 1 : 0;
}

/**
 * 総合力スコアが星ティアを越えた場合にカード表面を新テーマで再描画する。
 * CSS・カードHTML・列伝・バナー・ニックネームをすべて再適用する。
 */
function _reapplyCardTheme(newScore) {
  const newStars = _scoreToStars(newScore);
  currentStars = newStars;
  const t = getThemeVars(newStars);

  // ① CSS全体を新テーマで更新
  const styleEl = document.getElementById('card-dynamic-css');

    : buildHitterCard(g_selectedRow, g_rows, g_resolvedPhotoUrl || '', t, g_isCatcher, g_isPeakRow, nameEn);

  const frontCard = document.querySelector('#card-root .card-front-face .card');
  if (frontCard) frontCard.innerHTML = newContent;

  // ③ 再描画後の後処理（RAF内で実行してレイアウト確定後に）
  requestAnimationFrame(() => {
    fitPlayerNames();

    // 総合力数値を更新
    const powerEl = document.querySelector('#card-root .power-value');

      const cardTypeEl = document.querySelector('#card-root .card-type');
      if (cardTypeEl && cardType) cardTypeEl.textContent = cardType;

      // 球種ニックネーム
      if (pitchNicknames && typeof pitchNicknames === 'object') {
        Object.entries(pitchNicknames).forEach(([pitchName, nickname]) => {

            if (td.dataset.pitch !== pitchName) return;

              `<span style="font-size:8.5px;color:#ffdd33;font-weight:900;letter-spacing:0;white-space:nowrap;">（${escapeHtml(nickname)}）</span>`;
            td.style.setProperty('white-space',   'nowrap',   'important');

            td.style.removeProperty('font-size');

      if (bannerEl) _setBannerText(bannerEl, _bannerAwardsText(awardsJa, isCareer));

    // 列伝テキストを再適用

  });
}

/**
 * タイトル加点をDOMの総合力表示に反映する。
 * 基本スコアが100以上の場合は何もしない。
 * 星数が変わった場合はカードテーマごと再描画する。
 */
function _applyTitleBonus(awardsJa, isCareer) {
  const bonus = _calcTitleBonus(awardsJa, isCareer);
  if (bonus <= 0) return;

  // 100点以下は全加点、100点を超える分はROUND(超過分÷3)で計算
  let newScore;
  if (g_baseOverallScore >= 100) {
    // 既に100以上：全加点をROUND(÷3)で追加
    newScore = g_baseOverallScore + Math.round(bonus / 3);
  } else if (g_baseOverallScore + bonus > 100) {
    // 100を超える場合：100までは全点、超えた分をROUND(÷3)
    const over = (g_baseOverallScore + bonus) - 100;
    newScore = 100 + Math.round(over / 3);
  } else {
    // 100以内に収まる：全加点適用
    newScore = g_baseOverallScore + bonus;
  }
  const newStars = _scoreToStars(newScore);

  console.log(`[TitleBonus] base=${g_baseOverallScore} bonus=${bonus}${isCareer ? '(通算÷2)' : ''} → ${newScore} stars:${currentStars}→${newStars}`);

  if (newStars !== currentStars) {
    // 星数が変わった → テーマごと再描画
    _reapplyCardTheme(newScore);
  } else {
    // 同じ星数 → 数値のみ更新
    const powerEl = document.querySelector('#card-root .power-value');
    if (powerEl) {
      powerEl.textContent = String(newScore);
      if (newScore >= 100) powerEl.style.fontSize = '26px';
    }
  }
}

function updateRetsuden(text) {

function buildFallbackRetsuden(row) {
  const year = row[1] || '?';
  const name = row[0] || '---';

  if (g_isPitcher) {
    const era  = parseFloat(row[5]) || 99;
    const wins = row[3]  || 0;
    const loss = row[4]  || 0;
    const k    = row[15] || 0;
    const whip = row[17] || '--';
    const ip   = row[10] || '--';
    const totalG = row[6] || 0;
    const gs     = row[7] || 0;
    const strk = row[54] || 0;
    const ctrl = row[51] || 0;

    const isStarter = gs >= totalG * 0.5;
    const typeLabel = isStarter ? '先発' : 'リリーフ';

    if (!isStarter && era < 2.50) {
      return `${year}年、防御率${row[5]}・WHIP${whip}・${k}奪三振。チームの勝利の方程式を支えた絶対的${typeLabel}。`;
    }
    if (era < 2.50 && wins >= 15) {
      return `${year}年、${wins}勝${loss}敗・防御率${row[5]}・${k}奪三振。WHIP${whip}でリーグを圧倒。`;
    }
    if (strk >= 90) {
      return `${year}年、${wins}勝・防御率${row[5]}・${k}奪三振。剛腕で相手打線を翻弄したシーズン。`;
    }
    return `${year}年、${wins}勝${loss}敗・防御率${row[5]}・${k}奪三振・WHIP${whip}。チームを支えた安定感。`;
  } else {
    const avg  = fmtRate(row[15]);
    const obp  = fmtRate(row[16]);
    const ops  = fmtOPS(row[17]);
    const opsN = parseFloat(ops) || 0;
    const hr   = row[9]  || 0;
    const rbi  = row[10] || 0;
    const sb   = getSB(row);
    const speed  = row[46] || 0;

    if (g_isCatcher) {
      const lead   = row[53] ?? '--';
      const csRate = row[54] ?? '--';
      return `${year}年、打率${avg}・OPS${ops}・打点${rbi}。リード${lead}・盗塁阻止率${csRate}%でバッテリーを統率。`;
    }
    if (opsN >= 1.0 || hr >= 50) {
      return `${year}年、${hr}本塁打・${rbi}打点・OPS${ops}。出塁率${obp}と長打力でチームを牽引したシーズン。`;
    }
    if (hr >= 30) {
      return `${year}年、${hr}本塁打・${rbi}打点・打率${avg}・OPS${ops}。長打と安打でクリーンアップを担った。`;
    }
    if (speed >= 80 && sb >= 20) {
      return `${year}年、打率${avg}・${sb}盗塁・出塁率${obp}。俊足を武器に打線を活性化させたシーズン。`;
    }
    return `${year}年、打率${avg}・OPS${ops}・${hr}本塁打・${rbi}打点。チームの中軸として活躍したシーズン。`;
  }
}

/**
 * blob: URL または通常の画像URL を base64 data URL に変換する。
 * Canvas 経由で描画し JPEG として出力。変換不可の場合は空文字を返す。
 */
function imgSrcToDataUrl(src) {
  return new Promise((resolve) => {
    if (!src || src === '') { resolve(''); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width  = img.naturalWidth  || img.width;
        canvas.height = img.naturalHeight || img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/jpeg', 0.88));
      } catch (e) {
        // tainted canvas（外部ドメイン画像など）は無視
        resolve('');
      }
    };
    img.onerror = () => resolve('');
    img.src = src;
  });
}

function generateCard() {
  clearError();

  const excelInput = document.getElementById('excel-file');
  const photoInput = document.getElementById('photo-file');

  if (!excelInput.files || !excelInput.files[0]) {
    showError('❌ エクセルファイルを選択してください。');
    return;
  }

  // すでにg_rowsが読み込まれている場合はそれを使う
  if (g_rows && g_dataRows) {
    _doGenerate(photoInput);
    return;
  }

  // 未読み込みの場合は読み込む
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb   = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
      if (rows.length < 3) {
        showError('❌ データが少なすぎます。正しいエクセルファイルか確認してください。');
        return;
      }
      g_rows     = rows;
      g_headers  = rows.slice(0, 2);
      g_dataRows = rows.slice(2).filter(r => r[0] && r[0] !== null);
      g_isPitcher = rows[0][3] === '勝利' || rows[0][3] === '勝';
      g_isCatcher = !g_isPitcher && g_dataRows.some(r =>
        r[53] !== null && r[53] !== undefined && r[53] !== '--' && String(r[53]).trim() !== '');
      _doGenerate(photoInput);
    } catch (err) {
      showError('❌ 読み込みエラー: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(excelInput.files[0]);
}

/**
 * 野手裏面カードのチーム表示
 * 複数球団年（移籍あり）の場合: 最多試合チームコード + 総球団数 例: "NYY3"
 * 単一球団年の場合: そのままのチームコード 例: "NYY"
 */
function hitterTeamDisplay(row, allRows) {
  const year    = String(row[1] ?? '');
  const teamRaw = String(row[2] || '').toUpperCase();
  const sameYear = allRows.filter(r => String(r[1] ?? '') === year);
  const nonTot   = sameYear.filter(r => String(r[2] || '').toUpperCase() !== 'TOT');
  if (nonTot.length <= 1) return teamRaw;
  // 複数球団: G 最多のチームをプライマリとし、球団総数を付与
  const primary = nonTot.reduce((best, r) =>
    (parseInt(r[6]) || 0) > (parseInt(best[6]) || 0) ? r : best, nonTot[0]);
  const primaryCode = String(primary[2] || '').toUpperCase();
  if (teamRaw === 'TOT') return primaryCode + nonTot.length;
  return teamRaw;
}

// 既に描画済みの裏面テーブルに王冠マークを適用（DOM更新）
function _applyBackTableCrowns() {
  const backFace = document.getElementById('card-back-face');
  if (!backFace) return;
  backFace.querySelectorAll('td[data-statkey][data-year]').forEach(td => {
    const year  = td.dataset.year;
    const key   = td.dataset.statkey;
    const val   = td.dataset.val ?? '';        // 元の数値テキスト
    const rdYear = _rankDataByYear[year];
    if (!rdYear) return;
    const entry = rdYear[key];
    const rank  = entry ? entry.rank : 99;
    if (rank <= 3) {
      td.setAttribute('data-rank', rank);
      td.innerHTML = _rankWrapHtml(val, rank);
    } else {
      td.removeAttribute('data-rank');
      td.innerHTML = val;                      // 王冠なし→元テキストに戻す
    }
  });
}

// 未取得年度のリーグ順位データを非同期で一括取得し、王冠マークを更新
async function _enrichBackCrownsAsync() {
  if (!g_dataRows || !g_mlbId) return;
  const hdr = g_headers ? g_headers[0] || [] : [];

  // 未取得年度とその行データを収集
  // 年度ごとに全行を保持し、チームコード取得時にTOT行を避ける
  const yearRowsAll = {};
  g_dataRows.forEach(r => {
    const y = String(r[1] ?? '');
    if (/^\d{4}$/.test(y)) {
      if (!yearRowsAll[y]) yearRowsAll[y] = [];
      yearRowsAll[y].push(r);
    }
  });

  // 未取得年度のみ処理
  const years = Object.keys(yearRowsAll)
    .filter(y => !_rankDataByYear[y])
    .sort();
  if (years.length === 0) {
    // 全年度取得済み：王冠・通算バナーを即時更新して終了
    _applyBackTableCrowns();
    _refreshCareerBanner();
    return;
  }

  // 全年度を並列フェッチ（速度優先。件数は最大20年程度なので並列でも問題なし）
  const fetchOne = async (year) => {
    if (_rankDataByYear[year]) return;  // 取得済みならスキップ
    try {
      const rows = yearRowsAll[year];
      const totRow = rows.find(r => String(r[2] ?? '').toUpperCase() === 'TOT') || rows[rows.length - 1];
      const teamRow = rows.find(r => {
        const tc = String(r[2] ?? '').toUpperCase();
        return tc !== 'TOT' && tc !== '' && tc !== '--';
      }) || rows[0];
      const { leagueId } = getLeagueInfo(String(teamRow[2] ?? ''));
      const leaders = await fetchLeagueLeaders(year, g_isPitcher, leagueId);
      _rankDataByYear[year] = buildRankData(leaders, g_mlbId, '', {});
      console.log(`[Crowns] ${year} L=${leagueId}`, JSON.stringify(_rankDataByYear[year]));
    } catch (e) {
      console.warn(`[Crowns] ${year} 取得失敗:`, e.message);
      _rankDataByYear[year] = {};
    }
    _applyBackTableCrowns();  // 各年度完了次第即座に更新
  };
  await Promise.all(years.map(fetchOne));

  // 全年度完了後：最終まとめ更新 + 通算バナー再描画
  _applyBackTableCrowns();
  _refreshCareerBanner();
}

    g_dataRows.filter(r => !isCareerRow(r)).forEach(r => {
      const yr = String(r[1] ?? '');
      if (yr) { if (!yr2r[yr]) yr2r[yr] = []; yr2r[yr].push(r); }
    });
    const cRows = Object.values(yr2r).map(rows => {
      const tot = rows.find(r => String(r[2] || '').toUpperCase() === 'TOT');
      return tot || rows[0];
    });
    const getWt = r => {
      if (g_isPitcher) return parseFloat(r[10]) || 0;
      const ab = parseFloat(getFirstColVal(r, hdr, ['AB','打数','At Bats']));
      return isNaN(ab) ? 0 : ab;
    };
    let wS = 0, wT = 0;
    cRows.forEach(row => {
      const raw = resolveWAR(row, hdr, g_isPitcher);
      const num = parseFloat(String(raw ?? '').replace('~', ''));
      const w   = getWt(row);
      if (!isNaN(num) && w > 0) { wS += num * w; wT += w; }
    });
    return wT > 0 ? (wS / wT).toFixed(1) : null;
  })();

  // ── 列定義 ──
  let cols;
  if (g_isPitcher) {
    cols = [
      { label: '年度',   fn: r => r[1] ?? '--' },
      { label: 'チーム', fn: r => r[2] ?? '--' },
      { label: '防御率', fn: r => r[5] ?? '--' },
      { label: '勝利',   fn: r => r[3] ?? '--' },
      { label: '敗北',   fn: r => r[4] ?? '--' },
      { label: 'HLD',    fn: r => getFirstColVal(r, hdr, ['HLD','ホールド','H','Hold']) },
      { label: 'SV',     fn: r => getFirstColVal(r, hdr, ['SV','セーブ','Saves','Save','S']) },
      { label: 'IP',     fn: r => r[10] ?? '--' },
      { label: '被HR',   fn: r => getFirstColVal(r, hdr, ['被本塁打','HR','HRA','HR_A']) },
      { label: '四死球', fn: r => getFirstColVal(r, hdr, ['四死球','BB','四球','BBI','BB+HBP']) },
      { label: 'K',      fn: r => r[15] ?? '--' },
      { label: '被打率', fn: r => getFirstColVal(r, hdr, ['被打率','BAA','AVG Against','OBA']) },
      { label: 'FIP',    fn: r => fmtFIP(r) },
      { label: 'WHIP',   fn: r => r[17] ?? '--' },
      { label: 'WAR',    fn: r => isCareerRow(r) ? (_careerWAR ?? '--') : fmtWAR(resolveWAR(r, hdr, true)) },
    ];
  } else {
    cols = [
      { label: '年度',   fn: r => r[1] ?? '--' },
      { label: 'チーム', fn: r => hitterTeamDisplay(r, g_dataRows) },
      { label: '試合',   fn: r => r[6] ?? '--' },
      { label: '打数',   fn: r => getFirstColVal(r, hdr, ['AB','打数','At Bats']) },
      { label: '安打',   fn: r => getFirstColVal(r, hdr, ['H','安打','Hits']) },
      { label: '本塁打', fn: r => r[9] ?? '--' },
      { label: '打点',   fn: r => r[10] ?? '--' },
      { label: '四球',   fn: r => getFirstColVal(r, hdr, ['BB','四球','Walks','BB+HBP']) },
      { label: '三振',   fn: r => getFirstColVal(r, hdr, ['SO','K','三振','Strikeouts']) },
      { label: '盗塁',   fn: r => getSB(r, hdr) },
      { label: '打率',   fn: r => fmtRate(r[15]) },
      { label: '出塁率', fn: r => fmtRate(r[16]) },
      { label: 'OPS',    fn: r => fmtOPS(r[17]) },
      { label: 'WAR',    fn: r => isCareerRow(r) ? (_careerWAR ?? '--') : fmtWAR(resolveWAR(r, hdr, false)) },
    ];
  }

  // ── ハイライト列の定義 ──
  // 投手: WARをcb-hi、防御率・勝利・SV・Kをcb-pp
  // 野手: WAR・OPS・出塁率をcb-hi、打率・本塁打・打点をcb-pp
  const hiLabels = g_isPitcher
    ? new Set(['WAR'])
    : new Set(['WAR', 'OPS', '出塁率']);
  const ppLabels = g_isPitcher
    ? new Set(['防御率', '勝利', 'SV', 'K'])
    : new Set(['打率', '本塁打', '打点']);

  // ── 列名 → rankDataキー マッピング ──
  const _COL_RANK_MAP = {
    '防御率':'era', '勝利':'wins', 'SV':'sv', 'K':'k', 'WHIP':'whip', 'HLD':'hld',
    '打率':'avg', '本塁打':'hr', '打点':'rbi', '盗塁':'sb', 'OPS':'ops',
  };

  // ── テーブルHTML ──
  const thead = '<tr>' + cols.map(c => `<th>${escapeHtml(c.label)}</th>`).join('') + '</tr>';
  const tbody = g_dataRows.map(row => {
    const rowYear = String(row[1] ?? '');
    const rdYear  = /^\d{4}$/.test(rowYear) ? (_rankDataByYear[rowYear] || null) : null;
    const cells = cols.map((c, i) => {
      const v = c.fn(row);
      const s = (v === null || v === undefined || v === '') ? '--' : String(v);
      let cls = '';
      if      (i === 0)               cls = ' class="cb-year"';
      else if (i === 1)               cls = ' class="cb-team"';
      else if (hiLabels.has(c.label)) cls = ' class="cb-hi"';
      else if (ppLabels.has(c.label)) cls = ' class="cb-pp"';
      // 王冠マーク
      const rankKey   = _COL_RANK_MAP[c.label];
      const rankEntry = (rankKey && rdYear) ? rdYear[rankKey] : null;
      const rank      = rankEntry ? rankEntry.rank : 99;
      const rankAttrs = rankKey
        ? ` data-statkey="${rankKey}" data-year="${rowYear}" data-val="${escapeHtml(s)}"` +
          (rank <= 3 ? ` data-rank="${rank}"` : '')
        : '';
      const inner = (rank <= 3 && rankKey) ? _rankWrapHtml(escapeHtml(s), rank) : escapeHtml(s);
      return `<td${cls}${rankAttrs}>${inner}</td>`;
    });
    return '<tr>' + cells.join('') + '</tr>';
  }).join('');

  backFace.innerHTML =
    `<div class="card-back-card">` +
      `<div class="card-back-banner">` +
        `<span class="card-back-banner-name">${escapeHtml(name)}</span>` +
        `<span class="card-back-banner-sep">|</span>` +
        `<span class="card-back-banner-label">年度別成績</span>` +
      `</div>` +
      `<div class="card-back-scroll">` +
        `<table class="card-back-tbl">` +
          `<thead>${thead}</thead><tbody>${tbody}</tbody>` +
        `</table>` +
      `</div>` +
    `</div>`;

  // 未取得年度の順位データを非同期で補完し、王冠マークを更新
  _enrichBackCrownsAsync();

  // 裏面 face クリックで表面へ（右端 ~38px＝約1cm はスクロールバー領域のため除外）
  backFace.style.cursor = 'pointer';
  backFace.addEventListener('click', function(e) {
    const rect = backFace.getBoundingClientRect();
    if (e.clientX > rect.right - 38) return;  // 右端1cmはフリップしない
    flipToFront();
  });
}

// ===== 名前はみ出し防止 =====
function fitPlayerNames() {
  // ① 左パネル 選手名（player-name-ja）
  const jaEl = document.querySelector('#card-root .player-name-ja');
  if (jaEl) {
    const maxW = (jaEl.parentElement ? jaEl.parentElement.offsetWidth : 280) - 12;
    let fs = 28, ls = 4;
    jaEl.style.fontSize = fs + 'px';
    jaEl.style.letterSpacing = ls + 'px';
    while (jaEl.scrollWidth > maxW && fs > 11) {
      fs--;
      if (fs <= 22) ls = 3;
      if (fs <= 18) ls = 2;
      if (fs <= 14) ls = 1;
      jaEl.style.fontSize = fs + 'px';
      jaEl.style.letterSpacing = ls + 'px';
    }
  }

  // ② 左パネル 英語名（player-name-en）
  const enEl = document.querySelector('#card-root .player-name-en');
  if (enEl && enEl.textContent.trim()) {
    const maxW = (enEl.parentElement ? enEl.parentElement.offsetWidth : 280) - 12;
    let fs = 12, ls = 2;
    enEl.style.fontSize = fs + 'px';
    enEl.style.letterSpacing = ls + 'px';
    while (enEl.scrollWidth > maxW && fs > 9) {
      fs--;
      if (fs <= 10) ls = 1;
      enEl.style.fontSize = fs + 'px';
      enEl.style.letterSpacing = ls + 'px';
    }
  }

  // ③ 右パネル 選手名（player-full-name）
  const fnEl = document.querySelector('#card-root .player-full-name');
  if (fnEl) {
    const headerRow = fnEl.closest('.header-row');
    const posBadge   = headerRow && headerRow.querySelector('.position-badge');
    const seasonRight = headerRow && headerRow.querySelector('.season-badge');
    const usedW = (posBadge   ? posBadge.offsetWidth   + 10 : 70)
                + (seasonRight ? seasonRight.offsetWidth + 10 : 100)
                + 30; // gap 等の余裕
    const maxW = Math.max(80, (headerRow ? headerRow.offsetWidth : 420) - usedW);
    let fs = 22, ls = 2;
    fnEl.style.fontSize = fs + 'px';
    fnEl.style.letterSpacing = ls + 'px';
    while (fnEl.scrollWidth > maxW && fs > 11) {
      fs--;
      if (fs <= 18) ls = 1;
      if (fs <= 14) ls = 0;
      fnEl.style.fontSize = fs + 'px';
      fnEl.style.letterSpacing = ls + 'px';
    }
  }
}

async function _doGenerate(photoInput) {
  // Baseball-Reference データを事前取得（IDがあれば）
  if (g_brefId && !_brefCache[g_brefId]) {
    await fetchBRefData(g_brefId, g_isPitcher ?? false);
  }
  try {
    // 選択年のデータ行を取得
    const selYearEl = document.getElementById('year-select');
    let selectedRow;
    if (selYearEl && selYearEl.value && g_dataRows) {
      selectedRow = g_dataRows.find(r => String(r[1]) === String(selYearEl.value));
    }
    if (!selectedRow) {
      // フォールバック: ピーク年を自動検出
      if (g_isPitcher) {
        selectedRow = g_dataRows.reduce((best, r) => {
          const era = parseFloat(r[5]), bestEra = parseFloat(best[5]);
          return (!isNaN(era) && (isNaN(bestEra) || era < bestEra)) ? r : best;
        }, g_dataRows[0]);
      } else {
        selectedRow = g_dataRows.reduce((best, r) => {
          const opsCur  = parseFloat(fmtOPS(r[17])) || 0;
          const opsBest = parseFloat(fmtOPS(best[17])) || 0;
          return opsCur > opsBest ? r : best;
        }, g_dataRows[0]);
      }
    }

    // ピーク年かどうかのフラグ
    const isPeakRow = String(selectedRow[1]) === String(g_peakYear);

    // 通算行WARの事前計算（表面・裏面・総合力スコアで共有）
    {
      const _isCareer = r => !/^\d{4}$/.test(String(r[1] ?? '').trim());
      if (_isCareer(selectedRow) && g_headers && g_dataRows) {
        const hdr = g_headers[0] || [];
        const yr2r = {};
        g_dataRows.filter(r => !_isCareer(r)).forEach(r => {
          const yr = String(r[1] ?? '');
          if (yr) { if (!yr2r[yr]) yr2r[yr] = []; yr2r[yr].push(r); }
        });
        const cRows = Object.values(yr2r).map(rows => {
          const tot = rows.find(r => String(r[2] || '').toUpperCase() === 'TOT');
          return tot || rows[0];
        });
        const getWt = r => {
          if (g_isPitcher) return parseFloat(r[10]) || 0;
          const ab = parseFloat(getFirstColVal(r, hdr, ['AB','打数','At Bats']));
          return isNaN(ab) ? 0 : ab;
        };
        let wS = 0, wT = 0;
        cRows.forEach(r => {
          const raw = resolveWAR(r, hdr, g_isPitcher);
          const num = parseFloat(String(raw ?? '').replace('~', ''));
          const w   = getWt(r);
          if (!isNaN(num) && w > 0) { wS += num * w; wT += w; }
        });
        g_careerWAR = wT > 0 ? (wS / wT).toFixed(1) : null;
      } else {
        g_careerWAR = null;
      }
    }

    // 総合力 → 星数 → テーマ（キャップなし・100超で6星ホログラム）
    let overallScore;
    if (g_isPitcher) {
      const _fipOvr = (() => {
        const yr = String(selectedRow[1] ?? '');
        const brF = /^\d{4}$/.test(yr) ? getBRefFIP(yr) : null;
        return brF !== null ? parseFloat(brF) : calcFIP(selectedRow);
      })();
      // WAR: 通算行は g_careerWAR（IP加重平均）を優先、単年は resolveWAR で取得
      const realWarP = g_careerWAR ?? (g_headers ? resolveWAR(selectedRow, g_headers[0], true) : '--');
      overallScore = calcPitcherOverall(selectedRow, _fipOvr, realWarP);
    } else {
      const realWarG = g_careerWAR ?? (g_headers ? resolveWAR(selectedRow, g_headers[0], false) : '--');
      overallScore = calcHitterOverall(selectedRow, g_isCatcher, realWarG);
    }
    g_baseOverallScore = overallScore; // タイトル加点前のスコアを保存
    g_selectedRow      = selectedRow;
    g_isPeakRow        = isPeakRow;

    const stars = overallScore > 99 ? 6
                : overallScore >= 90 ? 5
                : overallScore >= 80 ? 4
                : overallScore >= 70 ? 3
                : overallScore >= 60 ? 2
                : overallScore >= 50 ? 1 : 0;
    currentStars = stars;
    const theme  = getThemeVars(stars);

    // カードHTML生成（英語名を渡す）
    const nameEn = g_mlbNameEn || '';
    let cardContent;
    if (g_isPitcher) {
      cardContent = buildPitcherCard(selectedRow, g_rows, '__PHOTO__', theme, isPeakRow, nameEn);
    } else {
      cardContent = buildHitterCard(selectedRow, g_rows, '__PHOTO__', theme, g_isCatcher, isPeakRow, nameEn);
    }

    // 写真の差し込み
    // 優先順位: ① 手動アップロード写真 → ② MLB.com ヘッドショット → ③ なし
    if (photoInput && photoInput.files && photoInput.files[0]) {
      const photoURL = URL.createObjectURL(photoInput.files[0]);
      cardContent = cardContent.replace(/__PHOTO__/g, photoURL);
      g_resolvedPhotoUrl = photoURL;
    } else if (g_mlbHeadshot) {
      cardContent = cardContent.replace(/__PHOTO__/g, g_mlbHeadshot);
      g_resolvedPhotoUrl = g_mlbHeadshot;
    } else {
      cardContent = cardContent.replace(/__PHOTO__/g, '');
      g_resolvedPhotoUrl = '';
    }

    // スコープ付き CSS をページに注入
    let styleEl = document.getElementById('card-dynamic-css');
    if (styleEl) styleEl.remove();
    styleEl = document.createElement('style');
    styleEl.id = 'card-dynamic-css';
    styleEl.textContent = getCardCSS(theme);
    document.head.appendChild(styleEl);

    // カード描画（フリップ構造）
    const area = document.getElementById('card-area');
    area.innerHTML =
      `<div id="card-root">` +
        `<div class="card-flip-scene">` +
          `<div class="card-flip-inner" id="card-flip-inner">` +
            `<div class="card-face card-front-face"><div class="card">${cardContent}</div></div>` +
            `<div class="card-face card-back-face" id="card-back-face"></div>` +
          `</div>` +
        `</div>` +
      `</div>`;

    // 名前はみ出し防止 ＋ 裏面構築（描画後に測定）
    requestAnimationFrame(() => {
      fitPlayerNames();
      // フリップ内の高さを表面カードに合わせる
      const flipInner = document.getElementById('card-flip-inner');
      const frontCard = flipInner && flipInner.querySelector('.card-front-face .card');
      if (flipInner && frontCard) {
        flipInner.style.height = frontCard.offsetHeight + 'px';
      }
      // 裏面HTML構築
      buildAndAttachCardBack();
      // 初期状態: 裏面はポインターイベント無効
      if (flipInner) _syncFlipPointerEvents(flipInner, false);
      // 表面全体クリック → 裏返し
      const frontFace = flipInner && flipInner.querySelector('.card-front-face');
      if (frontFace) {
        frontFace.style.cursor = 'pointer';
        frontFace.addEventListener('click', () => toggleCardFlip(null));
      }
    });

    // 保存ボタンを表示・保存データをセット
    currentSaveData = {
      theme,
      playerName: selectedRow[0] || 'player',
      year      : selectedRow[1] || '0000',
    };
    document.getElementById('save-area').style.display = 'flex';
    document.getElementById('save-msg').textContent = '';

    area.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // AI列伝生成（非同期）― JSON形式で retsuden / cardType / pitchNicknames / awardsJa を取得
    fetchRetsudenFromAPI(selectedRow)
      .then(result => {
        updateRetsuden(result.retsuden || result);
        updateCardExtras(result.cardType || null, result.pitchNicknames || {}, result.awardsJa || [], !!result.isCareer);
      })
      .catch(err => {
        console.warn('AI列伝エラー（統計テキストで代替）:', err.message);
        // エラー内容を画面に表示（原因特定のため）
        const retEl = document.getElementById('retsuden-area');
        if (retEl) retEl.innerHTML = `<strong>【列伝】</strong> <span style="color:#ff8888">⚠️ MLB情報取得失敗: ${escapeHtml(err.message)}</span><br><span style="font-size:10px;color:#aaa">※ MLB IDが設定されているか、またはインターネット接続を確認してください</span>`;
        updateRetsudenFallback(selectedRow);
      });

  } catch (err) {
    showError('❌ カード生成エラー: ' + err.message);
    console.error(err);
  }
}

// ===== テスト用ヘルパー（開発時のみ使用） =====
window._injectTestData = function(rows, isPitcher, isCatcher, peakYear) {
  g_rows      = rows;
  g_headers   = rows.slice(0, 2);
  g_dataRows  = rows.slice(2).filter(r => r[0] != null);
  g_isPitcher = !!isPitcher;
  g_isCatcher = !!isCatcher;
  g_peakYear  = peakYear || (g_dataRows[0] && g_dataRows[0][1]);
  const yearSel = document.getElementById('year-select');
  if (yearSel && g_dataRows.length > 0) {
    yearSel.innerHTML = g_dataRows.map(r =>
      `<option value="${r[1]}">${r[1]}${r[1] == g_peakYear ? ' ★ピーク' : ''}</option>`
    ).join('');
    yearSel.value = String(g_peakYear);
  }
  document.getElementById('year-selector-section').style.display = 'block';
  clearError();
  _doGenerate(null);
};
