<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MLBカード生成ツール</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at center, #1e0a3c 0%, #12001e 70%);
    min-height: 100vh;
    font-family: 'MS Gothic', 'Yu Gothic', 'Hiragino Kaku Gothic Pro', sans-serif;
    color: #fff;
    padding: 40px 20px;
  }
  .app-wrap { max-width: 920px; margin: 0 auto; }
  .app-title {
    text-align: center;
    font-size: 26px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 2px 2px 0 #000, 0 0 20px #ffd70066;
    margin-bottom: 6px;
    letter-spacing: 4px;
  }
  .app-sub { text-align: center; font-size: 12px; color: #8898b0; margin-bottom: 28px; letter-spacing: 1px; }

  /* ── メイン入力パネル ── */
  .input-panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 22px 26px;
    margin-bottom: 12px;
    display: flex;
    gap: 18px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .input-group { flex: 1; min-width: 200px; }
  .input-label {
    display: block;
    font-size: 11px;
    color: #88aac8;
    margin-bottom: 8px;
    letter-spacing: 2px;
    font-weight: 900;
  }
  input[type="file"] {
    display: block;
    width: 100%;
    padding: 9px 12px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 7px;
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  input[type="file"]::file-selector-button {
    background: rgba(80,50,0,0.9);
    color: #ffd700;
    border: 1px solid #ffd70066;
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    font-size: 11px;
    margin-right: 8px;
    font-family: inherit;
  }
  .btn-generate {
    flex-shrink: 0;
    padding: 13px 36px;
    background: linear-gradient(135deg, #b07800, #f5c518, #b07800);
    color: #1a0c00;
    border: none;
    border-radius: 9px;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 4px;
    cursor: pointer;
    box-shadow: 0 4px 20px #ffd70033;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 6px 28px #ffd70055; }
  .btn-generate:active { transform: translateY(0); }

  /* ── 年代選択パネル ── */
  #year-selector-section {
    background: rgba(255,215,0,0.06);
    border: 1px solid rgba(255,215,0,0.20);
    border-radius: 12px;
    padding: 16px 26px;
    margin-bottom: 12px;
    display: none;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  #year-selector-section .input-group { flex: 0 0 auto; min-width: 160px; }
  select#year-select {
    display: block;
    width: 100%;
    padding: 9px 12px;
    background: rgba(0,0,0,0.50);
    border: 1px solid #ffd70055;
    border-radius: 7px;
    color: #ffd700;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    appearance: auto;
  }
  select#year-select option { background: #1a1000; color: #fff; }
  #year-info {
    flex: 1;
    font-size: 12px;
    color: #aabbd0;
    line-height: 1.7;
    min-width: 180px;
  }
  #year-info .peak-tag {
    display: inline-block;
    background: rgba(180,0,50,0.50);
    border: 1px solid #ff4477;
    border-radius: 4px;
    padding: 1px 7px;
    color: #ff8899;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 1px;
    margin-left: 5px;
  }

  /* ── MLB 選手検索パネル ── */
  #mlb-search-section {
    background: rgba(0,80,160,0.10);
    border: 1px solid rgba(100,180,255,0.22);
    border-radius: 12px;
    padding: 14px 22px 16px;
    margin-bottom: 12px;
  }
  #mlb-search-section .input-label { color: #88bbee; }
  .mlb-search-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  #mlb-search-input {
    flex: 1;
    padding: 8px 12px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(100,180,255,0.30);
    border-radius: 7px;
    color: #cce4ff;
    font-size: 13px;
    font-family: inherit;
  }
  #mlb-search-input:focus { outline: none; border-color: #4499ff88; }
  .btn-mlb-search {
    padding: 8px 18px;
    background: rgba(0,60,130,0.85);
    color: #88ccff;
    border: 1px solid #3388ff66;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-mlb-search:hover { background: rgba(0,80,170,0.90); color: #aaddff; }
  .btn-mlb-search:disabled { opacity: 0.5; cursor: default; }
  #mlb-search-results {
    margin-top: 8px;
    max-height: 200px;
    overflow-y: auto;
    border-radius: 7px;
    border: 1px solid transparent;
  }
  #mlb-search-results:not(:empty) { border-color: rgba(100,180,255,0.20); }
  .mlb-result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 0.12s;
  }
  .mlb-result-item:last-child { border-bottom: none; }
  .mlb-result-item:hover { background: rgba(0,80,160,0.35); }
  .mlb-result-thumb {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    background: #1a2a3a;
    border: 1px solid rgba(100,180,255,0.30);
    flex-shrink: 0;
  }
  .mlb-result-name { color: #cce4ff; font-size: 13px; font-weight: 900; letter-spacing: 1px; }
  .mlb-result-sub  { color: #6699bb; font-size: 11px; margin-top: 2px; }
  /* 選択済み選手表示 */
  #mlb-selected-player {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(0,60,120,0.40);
    border: 1px solid #3388ff55;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #mlb-selected-photo {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    object-fit: cover;
    background: #0a1828;
    border: 2px solid #4488ff55;
    flex-shrink: 0;
  }
  .mlb-selected-info { flex: 1; min-width: 0; }
  .mlb-selected-name { color: #aaddff; font-size: 15px; font-weight: 900; letter-spacing: 2px; }
  .mlb-selected-meta { color: #5599bb; font-size: 11px; margin-top: 3px; }
  .btn-mlb-clear {
    padding: 5px 12px;
    background: rgba(80,0,0,0.70);
    color: #ff8888;
    border: 1px solid #ff444455;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
  }
  .btn-mlb-clear:hover { background: rgba(120,0,0,0.80); }

  /* ── エラーボックス ── */
  #error-box {
    background: rgba(180,0,0,0.3);
    border: 1px solid #ff5555;
    border-radius: 8px;
    padding: 11px 16px;
    margin-bottom: 16px;
    color: #ffaaaa;
    font-size: 13px;
    display: none;
  }

  /* ── カード表示エリア ── */
  #card-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 10px;
    gap: 14px;
  }
  #card-root {
    display: flex;
    justify-content: center;
    font-family: 'MS Gothic', 'Yu Gothic', 'Hiragino Kaku Gothic Pro', sans-serif;
  }
  /* ── 保存ボタンエリア ── */
  #save-area {
    display: none;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-save {
    padding: 10px 28px;
    background: linear-gradient(135deg, #1a3a6a, #2a5aaa, #1a3a6a);
    color: #aaccff;
    border: 1px solid #4488ff88;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 3px 14px #0044aa44;
    transition: transform 0.12s, box-shadow 0.12s;
    font-family: inherit;
  }
  .btn-save:hover { transform: translateY(-2px); box-shadow: 0 5px 20px #0066cc55; color: #ddeeff; }
  .btn-save:active { transform: translateY(0); }
  #save-msg { font-size: 12px; color: #77cc88; font-weight: 900; letter-spacing: 1px; }

  /* ── カードフリップ（機構のみ） ── */
  .card-flip-scene { perspective: 1400px; }
  .card-flip-inner {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-flip-inner.flipped { transform: rotateY(180deg); }
  .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .card-back-face {
    transform: rotateY(180deg);
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
  }
</style>
</head>
<body>
<div class="app-wrap">
  <h1 class="app-title">⚾ MLBカード生成ツール</h1>
  <p class="app-sub">投手・野手・捕手のエクセルデータ＋選手写真を読み込み、データカードを自動生成</p>

  <!-- メイン入力 -->
  <div class="input-panel">
    <div class="input-group">
      <label class="input-label">📊 エクセルデータ (.xlsx)</label>
      <input type="file" id="excel-file" accept=".xlsx,.xls" onchange="onExcelChange(this)">
    </div>
    <div class="input-group">
      <label class="input-label">📷 選手写真（省略可）</label>
      <input type="file" id="photo-file" accept="image/*">
    </div>
    <button class="btn-generate" onclick="generateCard()">カード生成</button>
  </div>

  <!-- MLB 選手検索パネル（省略可） -->
  <div id="mlb-search-section">
    <div class="input-group">
      <label class="input-label">🔍 MLB選手検索（省略可）— 英語名・顔写真・列伝強化に使用</label>
      <div class="mlb-search-row">
        <input id="mlb-search-input" type="text"
               placeholder="例: Dylan Cease / Shohei Ohtani"
               onkeydown="if(event.key==='Enter') mlbSearch()">
        <button class="btn-mlb-search" id="mlb-search-btn" onclick="mlbSearch()">🔍 検索</button>
      </div>
    </div>
    <div id="mlb-search-results"></div>
    <div id="mlb-selected-player" style="display:none;">
      <img id="mlb-selected-photo" src="" alt="">
      <div class="mlb-selected-info">
        <div class="mlb-selected-name" id="mlb-selected-name-label"></div>
        <div class="mlb-selected-meta" id="mlb-selected-meta-label"></div>
      </div>
      <button class="btn-mlb-clear" onclick="clearMlbSelection()">✕ 選択解除</button>
    </div>
  </div>

  <!-- Baseball-Reference ID（Excel読込後に表示） -->
  <div id="bref-section" style="display:none; margin-bottom:10px;">
    <div class="input-group">
      <label class="input-label">📚 Baseball-Reference ID（省略可）— WAR・FIP取得に使用</label>
      <div class="mlb-search-row">
        <input id="bref-id-input" type="text"
               placeholder="例: suzukic01 / willide03（URLの末尾部分）"
               style="flex:1;"
               oninput="onBrefIdInput(this.value)">
        <button class="btn-mlb-search" onclick="loadBRefData()">📥 取得</button>
      </div>
      <div id="bref-status" style="font-size:11px;color:#88aac8;margin-top:4px;"></div>
    </div>
  </div>

  <!-- 年代選択パネル（Excel読込後に表示） -->
  <div id="year-selector-section">
    <div class="input-group">
      <label class="input-label">📅 生成する年代</label>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:nowrap;">
        <select id="year-select" onchange="onYearChange()" style="flex:0 0 auto;width:auto;"></select>
        <button class="btn-generate" id="btn-gen-year" onclick="generateCard()" style="flex-shrink:0;margin:0;padding:10px 20px;font-size:13px;white-space:nowrap;">カード生成</button>
      </div>
    </div>
    <div id="year-info"></div>
  </div>

  <div id="error-box"></div>

  <!-- 保存ボタン（カード生成後に表示） -->
  <div id="save-area">
    <button class="btn-save" onclick="saveCardAsHTML()">💾 HTMLとして保存</button>
    <span id="save-msg"></span>
  </div>

  <div id="card-area"></div>
</div>


<script>
// ===== グローバル状態 =====
let g_rows     = null;   // Excel全行データ
let g_headers  = null;   // ヘッダー行（rows[0], rows[1]）
let g_dataRows = null;   // データ行（rows[2]以降）
let g_peakYear = null;   // 自動検出ピーク年
let g_isPitcher  = false;
let g_isCatcher  = false;
let g_careerWAR  = null;   // 通算行専用：加重平均WAR（_doGenerateで事前計算）
let g_lastAwardsJa      = [];   // 直近カードのawardsJa（通算バナー再描画用）
let g_lastIsCareer      = false; // 直近カードが通算行かどうか
let g_baseOverallScore  = 0;    // タイトル加点前の基本総合力
let g_selectedRow       = null; // 最後に生成したデータ行（テーマ再適用用）
let g_resolvedPhotoUrl  = '';   // 最後に使った写真URL（テーマ再適用用）
let g_isPeakRow         = false; // ピーク年フラグ（テーマ再適用用）
let g_lastCardExtras    = null; // 最後のupdateCardExtrasパラメータ（テーマ再適用用）
let g_lastRetsuden      = '';   // 最後の列伝テキスト（テーマ再適用用）

// MLB.com 連携（省略可）
let g_mlbId       = null;   // MLB選手ID
let g_mlbNameEn   = null;   // 英語正式名称 (例: "Dylan Cease")
let g_mlbHeadshot = null;   // ヘッドショット画像URL
let g_mlbPos      = null;   // ポジション略称
let g_mlbTeam     = null;   // 現所属チーム名

// Baseball-Reference 連携（省略可）
let g_brefId     = null;    // BR選手ID (例: "willide03" / "suzukic01")
const _brefCache = {};      // { brefId: { "2023": { war:"3.2", fip:"2.84" }, ... } }

// リーグ順位キャッシュ（年度別）: { "2023": { era:{rank:1,value:"2.50"}, ... } }
const _rankDataByYear = {};
// 年度別アワードキャッシュ: { "2023": ["サイ・ヤング賞", "最優秀防御率", ...] }
const _awardsJaByYear = {};

// ===== MLB.com 連携 =====
async function mlbSearch() {
  const input = document.getElementById('mlb-search-input');
  const btn   = document.getElementById('mlb-search-btn');
  const q     = (input.value || '').trim();
  if (!q) return;

  const resultsEl = document.getElementById('mlb-search-results');
  resultsEl.innerHTML = '<div style="padding:8px 12px;color:#6699bb;font-size:12px;">🔍 検索中…</div>';
  btn.disabled = true;

  try {
    // MLB Stats API は CORS 許可済のため、ブラウザから直接呼び出す（サーバー経由不要）
    const mlbUrl = 'https://statsapi.mlb.com/api/v1/people/search?names='
                 + encodeURIComponent(q) + '&sportId=1';
    const res  = await fetch(mlbUrl);
    if (!res.ok) throw new Error('MLB API エラー (HTTP ' + res.status + ')');
    const data = await res.json();

    const people = (data.people || []).slice(0, 8);
    if (people.length === 0) {
      resultsEl.innerHTML = '<div style="padding:8px 12px;color:#886644;font-size:12px;">該当選手が見つかりませんでした（英語フルネームで検索してください）</div>';
      return;
    }

    // data-* 属性を使い、特殊文字(アポストロフィ等)によるJS構文エラーを回避
    const items = people.map(p => {
      const pos   = p.primaryPosition ? p.primaryPosition.abbreviation : '';
      const team  = p.currentTeam     ? p.currentTeam.name             : '';
      const thumb = `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_60,q_auto:best/v1/people/${p.id}/headshot/67/current`;
      const el = document.createElement('div');
      el.className = 'mlb-result-item';
      el.dataset.id   = p.id;
      el.dataset.name = p.fullName;
      el.dataset.pos  = pos;
      el.dataset.team = team;
      el.innerHTML = `
        <img class="mlb-result-thumb" src="${thumb}" alt="" onerror="this.src=''">
        <div>
          <div class="mlb-result-name">${escapeHtml(p.fullName)}</div>
          <div class="mlb-result-sub">${escapeHtml(pos)}${team ? ' · ' + escapeHtml(team) : ''}</div>
        </div>`;
      el.addEventListener('click', () =>
        mlbSelectPlayer(Number(el.dataset.id), el.dataset.name, el.dataset.pos, el.dataset.team));
      return el;
    });

    resultsEl.innerHTML = '';
    items.forEach(el => resultsEl.appendChild(el));

  } catch (e) {
    resultsEl.innerHTML = `<div style="padding:8px 12px;color:#ff8888;font-size:12px;">❌ エラー: ${escapeHtml(e.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
}

async function mlbSelectPlayer(id, fullName, pos, team) {
  // 検索結果リストを閉じる
  document.getElementById('mlb-search-results').innerHTML = '';

  // グローバル状態を更新
  g_mlbId       = id;
  g_mlbNameEn   = fullName;
  g_mlbPos      = pos;
  g_mlbTeam     = team;
  g_mlbHeadshot = `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/${id}/headshot/67/current`;

  // 選択済み表示
  const photoEl = document.getElementById('mlb-selected-photo');
  photoEl.src   = g_mlbHeadshot;
  photoEl.onerror = () => { photoEl.src = ''; };
  document.getElementById('mlb-selected-name-label').textContent = fullName;
  document.getElementById('mlb-selected-meta-label').textContent =
    (pos ? pos : '') + (team ? (pos ? ' · ' : '') + team : '') + `  (ID: ${id})`;
  document.getElementById('mlb-selected-player').style.display = 'flex';
  document.getElementById('mlb-search-input').value = fullName;

  // ── Baseball-Reference ID を自動取得（3段階フォールバック）──
  _autoFetchBRefId(id, fullName);
}

async function _autoFetchBRefId(mlbId, playerName) {
  const statusEl = document.getElementById('bref-status');
  const inputEl  = document.getElementById('bref-id-input');
  if (!statusEl || !inputEl) return;

  statusEl.style.color = '#ffd700';
  statusEl.textContent = '⏳ Baseball-Reference ID 取得中…';
  let brefId = null;

  // Step 1: MLB Stats API xrefIds
  try {
    const url = `https://statsapi.mlb.com/api/v1/people/${mlbId}?hydrate=xrefIds`;
    const res = await fetch(url, { signal: AbortSignal.timeout(7000) });
    if (res.ok) {
      const data = await res.json();
      const xrefs = data?.people?.[0]?.xrefIds ?? [];
      console.log('[BRef AutoID] xrefIds:', JSON.stringify(xrefs));
      const brefEntry = xrefs.find(x => {
        const t = String(x.xrefIdType ?? '').toLowerCase();
        return t.includes('bref') || t.includes('bbref') || t === 'br' || t.includes('baseball');
      });
      if (brefEntry?.xrefId) brefId = String(brefEntry.xrefId).trim();
    }
  } catch (e) { console.warn('[BRef AutoID] MLB API:', e.message); }

  // Step 2: BR name search
  if (!brefId) {
    const name = playerName || g_mlbNameEn;
    if (name) {
      statusEl.textContent = '⏳ Baseball-Reference で名前検索中…';
      try { brefId = await _searchBRefIdByName(name); }
      catch (e) { console.warn('[BRef AutoID] BR search:', e.message); }
    }
  }

  // Step 3: Generate candidates → show buttons
  if (!brefId) {
    const name = playerName || g_mlbNameEn;
    if (name) {
      const candidates = _genBRefCandidates(name);
      if (candidates.length > 0) {
        _renderBRefCandidates(candidates, statusEl, inputEl);
        return;
      }
    }
    statusEl.style.color = '#88aac8';
    statusEl.textContent = 'BR ID が見つかりません（手動入力してください）';
    return;
  }

  // 取得成功 → ID セット後、Excel読込済みであればWAR/FIPデータも自動取得
  g_brefId = brefId;
  inputEl.value = brefId;
  statusEl.style.color = '#77cc88';
  statusEl.textContent = `✓ BR ID 自動取得: ${brefId}`;

  if (g_dataRows) {
    statusEl.textContent = `✓ BR ID: ${brefId}　⏳ WAR/FIPデータ取得中…`;
    delete _brefCache[brefId];
    await fetchBRefData(brefId, g_isPitcher ?? false);
    const years = _brefCache[brefId] ? Object.keys(_brefCache[brefId]) : [];
    if (years.length > 0) {
      statusEl.style.color = '#77cc88';
      statusEl.textContent = `✓ BR ID: ${brefId}　WAR/FIP取得済（${years.length}年分）`;
    } else {
      statusEl.style.color = '#ffaa44';

async function _searchBRefIdByName(name) {
  const searchUrl = `https://www.baseball-reference.com/search/search.fcgi?search=${encodeURIComponent(name)}`;
  const proxyUrl  = `https://corsproxy.io/?url=${encodeURIComponent(searchUrl)}`;
  const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const found = [];
  const re = /\/players\/[a-z]\/([a-z0-9]+)\.shtml/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (!found.includes(m[1])) found.push(m[1]);
  }
  console.log('[BRef AutoID] BR search candidates:', found);
  if (found.length > 0) {
    const parts = name.trim().split(/\s+/);
    const lastInitial = parts.length >= 2 ? parts[parts.length - 1][0].toLowerCase() : '';
    const filtered = found.filter(id => !lastInitial || id[0] === lastInitial);
    return (filtered.length > 0 ? filtered : found)[0];
  }
  return null;
}

function _genBRefCandidates(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length < 2) return [];
  const last  = parts[parts.length - 1].toLowerCase().replace(/[^a-z]/g, '');
  const first = parts[0].toLowerCase().replace(/[^a-z]/g, '');
  const prefix = last.slice(0, 5) + first.slice(0, 2);
  return ['01','02','03','04','05'].map(n => prefix + n);
}

function fmtWAR(v) {
  if (v === null || v === undefined || v === '--' || v === '') return '--';
  const s = String(v).trim();
  const num = parseFloat(s.replace('~', ''));
  if (isNaN(num)) return s;
  return num.toFixed(1);
}
function fmtRate(v) {
  if (v === null || v === undefined || v === '--') return '--';
  const s = String(v).trim();
  if (/^\d{3}$/.test(s)) return '.' + s;
  return s;
}
function fmtOPS(v) {
  if (v === null || v === undefined || v === '--' || v === '') return '--';
  const s = String(v).trim();
  // 4桁整数（例: 1379 → "1.379"）
  if (/^1\d{3}$/.test(s)) return s[0] + '.' + s.slice(1);
  // 3桁整数（例: 750 → ".750"）
  if (/^\d{3}$/.test(s)) return '.' + s;
  // 小数点始まり（例: ".750" → そのまま）
  if (s.startsWith('.')) return s;
  // "0.750" 形式 → ".750"
  if (/^0\./.test(s)) return s.slice(1);
  return s;
}
function fmtPct(v) {
  if (v === null || v === undefined) return '--';
  return v + '%';
}
function safeNum(v) {
  if (v === null || v === undefined || v === '--' || v === '') return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}
/**
 * 盗塁（SB）の値を取得する。
 * ヘッダー行で 'SB' / '盗塁' / '盗塁数' を検索し、
 * 見つからない場合は row[11]（旧デフォルト）を返す。
 * headerRow を省略した場合はグローバル g_headers を使用。
 */
function getSB(row, headerRow) {
  const hdr = headerRow || (g_headers && g_headers[0]);
  if (hdr) {
    for (const name of ['SB', '盗塁', '盗塁数', 'Stolen Bases']) {
      const idx = findColIdx(hdr, name);
      if (idx >= 0) return parseInt(row[idx]) || 0;
    }
  }
  return parseInt(row[11]) || 0;
}

/** ヘッダー行（配列）から列名（大小文字不問）を検索してインデックスを返す。見つからない場合は -1 */
function findColIdx(headerRow, name) {
  if (!headerRow) return -1;
  const target = name.trim().toUpperCase();
  return headerRow.findIndex(h => String(h ?? '').trim().toUpperCase() === target);
}
/** 行データとヘッダー行から列名でセル値を取得。なければ fallback */
function getColVal(row, headerRow, name, fallback = '--') {
  const idx = findColIdx(headerRow, name);
  if (idx < 0) return fallback;
  const v = row[idx];
  return (v === null || v === undefined || v === '') ? fallback : v;
}

// ===== WAR 推定ロジック（スプレッドシートに WAR 列がない場合のフォールバック） =====
/**
 * 野手 WAR 推定（bWAR 近似）
 *   battingWAR  = (OPS − リーグ平均 0.728) × 15 × 出場比率
 *   fieldingWAR = 全ポジション合計 DRS ÷ 10
 *   bsrWAR      = SB ÷ 20 × 出場比率
 *   replWAR     = 2.0 × 出場比率  （代替選手基準）
 * 推定値は "~X.X" 形式で表示（実測値と区別）
 */
function estimateHitterWAR(row) {
  const ops    = parseFloat(fmtOPS(row[17]));
  const rawG   = parseInt(row[6]);
  const games  = (!isNaN(rawG) && rawG >= 1 && rawG <= 162) ? rawG : 150;
  const sb     = getSB(row);
  if (!ops || isNaN(ops) || ops <= 0) return null;

  const ptRatio = Math.min(games, 162) / 162;

  // 打撃貢献
  const battingWAR = (ops - 0.728) * 15 * ptRatio;

  // 守備貢献（DRS ÷ 10 ≈ WAR）
  let totalDrs = 0, totalInn = 0;
  for (let i = 0; i < 8; i++) {
    const inn = parseFloat(row[28 + i * 2]) || 0;
    const drs = safeNum(row[29 + i * 2]) || 0;
    if (inn > 0) { totalDrs += drs; totalInn += inn; }
  }
  const fieldingWAR = totalInn > 0 ? totalDrs / 10 : 0;

  // 走塁貢献（SB 20本 ≒ 0.5 WAR）
  const bsrWAR = (sb / 20) * ptRatio;

  // 代替選手比較基準
  const replWAR = 2.0 * ptRatio;

  const total = battingWAR + fieldingWAR + bsrWAR + replWAR;
  return Math.round(total * 10) / 10;
}

/**
 * 投手 WAR 推定（bWAR 近似）
 *   (代替ERA − 実測ERA) × IP ÷ 9 ÷ runsPerWin
 *   先発代替ERA = 5.40 / リリーフ代替ERA = 5.60 / runsPerWin = 9.0
 */
function estimatePitcherWAR(row) {
  const era    = parseFloat(row[5]);
  const ip     = parseFloat(row[10]);
  const gs     = parseInt(row[7]) || 0;
  const totalG = parseInt(row[6]) || 1;
  if (isNaN(era) || isNaN(ip) || ip <= 0) return null;

  const isStarter = gs >= totalG * 0.5;
  const replERA   = isStarter ? 5.40 : 5.60;
  const war = (replERA - era) * ip / 9 / 9.0;
  return Math.round(war * 10) / 10;
}

// ===== Baseball-Reference データ取得 =====
/**
 * Baseball-Reference の選手ページを CORS プロキシ経由で取得し、
 * 年度別の WAR・FIP をキャッシュする。
 * @param {string} brefId  例: "willide03" / "suzukic01"
 * @param {boolean} isPitcher
 */
async function fetchBRefData(brefId, isPitcher) {
  if (!brefId || _brefCache[brefId]) return;
  _brefCache[brefId] = {};  // 空でもセットしてリトライを防ぐ
  try {
    const pageUrl = `https://www.baseball-reference.com/players/${brefId[0]}/${brefId}.shtml`;
    const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(pageUrl)}`;
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) { console.warn('[BRef] HTTP', res.status); return; }
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/html');

    // コメントアウトされた hidden テーブルを取り出す（BRefの一部テーブルは<!-- -->で隠れている）
    const allHtml = text.replace(/<!--([\s\S]*?)-->/g, '$1');
    const doc2 = new DOMParser().parseFromString(allHtml, 'text/html');

    const tableId = isPitcher ? 'pitching_standard' : 'batting_standard';
    const table = doc2.getElementById(tableId) || doc.getElementById(tableId);
    if (!table) { console.warn('[BRef] テーブルが見つかりません:', tableId); return; }

    table.querySelectorAll('tbody tr').forEach(tr => {
      if (tr.classList.contains('thead') || tr.classList.contains('minors_table')) return;
      const yearTh = tr.querySelector('th[data-stat="year_ID"]');
      const year   = yearTh ? yearTh.textContent.replace(/\D/g,'').trim() : '';
      if (!year || year.length !== 4) return;

      const get = (stat) => {
        const td = tr.querySelector(`td[data-stat="${stat}"]`);
        return td ? td.textContent.trim() : null;
      };
      const war = get('WAR');
      const fip = isPitcher ? get('fip') : null;

      if (!_brefCache[brefId][year]) _brefCache[brefId][year] = {};
      if (war && war !== '') _brefCache[brefId][year].war = war;
      if (fip && fip !== '') _brefCache[brefId][year].fip = fip;
    });
    console.log('[BRef] キャッシュ完了:', brefId, Object.keys(_brefCache[brefId]));
  } catch (e) {
    console.warn('[BRef] 取得失敗:', e.message || e);
  }
}

/** BR キャッシュから WAR を返す */
function getBRefWAR(year) {
  if (!g_brefId || !_brefCache[g_brefId]) return null;
  return _brefCache[g_brefId][String(year)]?.war ?? null;
}
/** BR キャッシュから FIP を返す */
function getBRefFIP(year) {
  if (!g_brefId || !_brefCache[g_brefId]) return null;
  return _brefCache[g_brefId][String(year)]?.fip ?? null;
}

// ===== FIP 計算 =====
/**
 * Excel データから FIP を計算（BR取得できない場合のフォールバック）
 * FIP = (13×被HR + 3×BB - 2×K) / IP + 3.10
 */
function calcFIP(row) {
  const ip = parseFloat(row[10]);
  if (!ip || ip <= 0) return null;
  const hr = parseInt(row[13]) || 0;
  const bb = parseInt(row[14]) || 0;
  const k  = parseInt(row[15]) || 0;
  const fip = (13 * hr + 3 * bb - 2 * k) / ip + 3.10;
  return Math.round(fip * 100) / 100;
}
/** FIP を文字列でフォーマット（3桁表示） */
function fmtFIP(row) {
  const year = String(row[1] ?? '');
  const brFip = /^\d{4}$/.test(year) ? getBRefFIP(year) : null;
  if (brFip !== null) return brFip;
  const calc = calcFIP(row);
  return calc !== null ? calc.toFixed(2) : '--';
}

/**
 * FIP → 総合力スコア変換
 * 先発: 5.00→60, 各0.5刻みで+10 → score = 60 + (5.00 - fip) * 20
 * リリーフ: 5.00→48、fip>=2.00: score = 48 + (5.00 - fip) * 20
 *           fip<2.00: score = 108 + (2.00 - fip) * 10
 */
function fipToScore(fip, isStarter) {
  if (isStarter) {
    return Math.round(60 + (5.00 - fip) * 20);
  } else {
    if (fip >= 2.00) return Math.round(48 + (5.00 - fip) * 20);
    return Math.round(108 + (2.00 - fip) * 10);
  }
}

/**
 * WAR 表示値を返す。
 *   ① スプレッドシートの WAR 列
 *   ② Baseball-Reference から取得したキャッシュ値
 *   ③ 推定値（"~X.X" 形式）
 */
function resolveWAR(row, headerRow, isPitcher) {
  const raw = getColVal(row, headerRow, 'WAR');
  if (raw !== '--') return raw;  // 実測値あり
  // BR キャッシュを確認
  const year = String(row[1] ?? '').trim();
  if (/^\d{4}$/.test(year)) {
    const brWar = getBRefWAR(year);
    if (brWar !== null) return String(brWar);
  }
  const est = isPitcher ? estimatePitcherWAR(row) : estimateHitterWAR(row);
  return est !== null ? String(est) : '--';
}
// 通算行の場合は g_careerWAR（加重平均）を優先して返す
function resolveWAREffective(row, headerRow, isPitcher) {
  const isCareer = !/^\d{4}$/.test(String(row[1] ?? '').trim());
  if (isCareer && g_careerWAR != null) return g_careerWAR;
  return resolveWAR(row, headerRow, isPitcher);
}

// ===== CARD CSS TEMPLATE =====
function getCardCSS(t) {
  return `
  #card-root * { margin:0; padding:0; box-sizing:border-box; }
  #card-root { font-family:'MS Gothic','Yu Gothic','Hiragino Kaku Gothic Pro',sans-serif; }
  #card-root .card {
    width:840px; height:530px; border-radius:16px;
    border:4px solid ${t.cardBorder}; background:${t.cardBg};
    box-shadow:${t.cardShadow}; display:flex; position:relative; overflow:hidden;
  }
  #card-root .card::after {
    content:''; position:absolute; top:0; left:0; right:0; height:50%;
    background:linear-gradient(to bottom,${t.sheen} 0%,transparent 100%);
    pointer-events:none; z-index:50; border-radius:14px 14px 0 0;
  }
  #card-root .top-banner {
    position:absolute; top:0; left:0; right:0; height:42px;
    background:${t.bannerBg}; display:flex; align-items:center;
    justify-content:space-between; padding:0 14px; z-index:20;
    border-bottom:3px solid ${t.bannerBorder}; box-shadow:0 3px 12px #00000066;
  }
  #card-root .banner-left { display:flex; align-items:center; gap:5px; flex-shrink:0; }
  #card-root .banner-awards {
    flex:1; text-align:center; padding:0 6px;
    font-size:13px; font-weight:900; letter-spacing:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    /* プリズム＋ラメ：レインボーグラデーション */
    background:linear-gradient(90deg,
      #ff4040 0%,#ff9900 14%,#ffe600 28%,#44ee44 42%,
      #00ccff 56%,#9966ff 70%,#ff44cc 85%,#ff4040 100%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    /* 2段階太く見せる: text-stroke で輪郭線を追加 */
    -webkit-text-stroke:0.7px rgba(255,230,80,0.55);
    /* 四方向の黒シャドウで輪郭を締め、グロー強化 */
    filter:
      drop-shadow(-1px -1px 0 #000d) drop-shadow(1px -1px 0 #000d)
      drop-shadow(-1px  1px 0 #000d) drop-shadow(1px  1px 0 #000d)
      drop-shadow(0 0 5px #fffc) drop-shadow(0 0 10px #ffcc00cc);
    background-size:200% auto; animation:prismShift 3s linear infinite;
  }
  @keyframes prismShift { to { background-position:200% center; } }
  #card-root .card-rank { color:#fff; font-size:20px; font-weight:900; letter-spacing:3px; text-shadow:2px 2px 0 #000,0 0 14px ${t.rankGlow}; flex-shrink:0; }
  #card-root .stars { color:${t.starsColor}; font-size:18px; text-shadow:1px 1px 0 #000,0 0 10px ${t.starsGlow}; letter-spacing:3px; flex-shrink:0; }
  #card-root .card-type { color:#fff; font-size:15px; font-weight:900; letter-spacing:2px; text-shadow:2px 2px 0 #000,0 0 10px ${t.typeGlow}; flex-shrink:0; white-space:nowrap; }
  #card-root .left-panel { width:285px; min-width:285px; position:relative; border-right:3px solid ${t.leftBorder}; overflow:hidden; }
  #card-root .photo-frame { position:absolute; top:0; left:0; right:0; bottom:0; background:linear-gradient(180deg,#4a3800 0%,#806000 50%,#382800 100%); }
  #card-root .photo-frame img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; }
  #card-root .photo-top-fade { position:absolute; top:0; left:0; right:0; height:55px; background:linear-gradient(to bottom,${t.photoTopColor} 0%,transparent 100%); z-index:2; }
  #card-root .photo-bot-fade { position:absolute; bottom:0; left:0; right:0; height:120px; background:linear-gradient(to top,${t.photoBotColor} 0%,${t.photoBotLight} 60%,transparent 100%); z-index:2; }
  #card-root .photo-side-fade { position:absolute; top:0; right:0; bottom:0; width:50px; background:linear-gradient(to left,${t.photoSideColor} 0%,transparent 100%); z-index:2; }
  #card-root .player-name-block { position:absolute; bottom:12px; left:0; right:0; text-align:center; z-index:5; }
  #card-root .player-name-ja { color:#fff; font-size:28px; font-weight:900; letter-spacing:4px; text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,0 0 16px ${t.nameGlow}; display:block; white-space:nowrap; }
  #card-root .player-name-en { color:${t.nameEnColor}; font-size:12px; font-weight:900; letter-spacing:2px; text-shadow:1px 1px 0 #000,-1px -1px 0 #000; display:block; margin-top:4px; white-space:nowrap; }
  #card-root .team-badge { position:absolute; top:48px; left:14px; border-radius:6px; padding:4px 14px; color:#fff; font-size:16px; font-weight:900; letter-spacing:4px; z-index:5; box-shadow:0 2px 8px #000000aa; }
  #card-root .power-display { position:absolute; top:46px; right:10px; text-align:center; z-index:5; background:rgba(0,0,0,0.60); border:2px solid ${t.powerBorder}; border-radius:8px; padding:3px 10px; }
  #card-root .power-label { color:${t.powerTextColor}; font-size:11px; font-weight:900; display:block; letter-spacing:1px; text-shadow:1px 1px 0 #000; }
  #card-root .power-value { color:${t.powerTextColor}; font-size:32px; font-weight:900; text-shadow:2px 2px 0 #000,0 0 14px ${t.nameGlow}; line-height:1; }
  #card-root .right-panel { flex:1; padding:52px 18px 10px 16px; display:flex; flex-direction:column; gap:6px; position:relative; z-index:2; background:${t.overlay}; overflow:hidden; }
  #card-root .header-row { display:flex; align-items:center; gap:10px; }
  #card-root .position-badge { background:${t.posBadgeBg}; border:2px solid ${t.posBadgeBorder}; border-radius:6px; padding:4px 12px; color:#fff; font-size:13px; font-weight:900; letter-spacing:2px; text-shadow:1px 1px 0 #000; box-shadow:0 2px 6px #000000aa; }
  #card-root .player-full-name { color:#fff; font-size:22px; font-weight:900; text-shadow:2px 2px 0 #000,0 0 16px ${t.nameGlow}; letter-spacing:2px; white-space:nowrap; overflow:visible; }
  #card-root .season-badge { margin-left:auto; background:rgba(0,0,0,0.55); border:2px solid ${t.seasonBorder}; border-radius:6px; padding:3px 12px; color:${t.seasonText}; font-size:13px; font-weight:900; letter-spacing:2px; text-shadow:1px 1px 0 #000; white-space:nowrap; }
  #card-root .record-bar { background:rgba(0,0,0,0.45); border:2px solid ${t.recBorder}; border-radius:8px; padding:5px 6px; display:flex; align-items:center; justify-content:space-between; }
  #card-root .rec-item { display:flex; flex-direction:column; align-items:center; flex:1; min-width:0; border-right:1px solid ${t.recBorder}88; padding:2px 3px; }
  #card-root .rec-item:last-child { border-right:none; }
  #card-root .rec-label { color:${t.recLabel}; font-size:10px; font-weight:900; letter-spacing:0; text-shadow:1px 1px 0 #000; white-space:nowrap; }
  #card-root .rec-val { color:#fff; font-size:21px; font-weight:900; line-height:1.1; text-shadow:1px 1px 0 #000; white-space:nowrap; }
  #card-root .rec-val.hl { color:${t.recHl}; text-shadow:1px 1px 0 #000,0 0 10px ${t.recHlGlow}; }
  #card-root .rec-val.pp { color:${t.recPp}; text-shadow:1px 1px 0 #000,0 0 10px ${t.recPpGlow}; }
  #card-root .rec-val.sm { font-size:16px; }
  #card-root .sec-title { color:${t.sectionText}; font-size:12px; font-weight:900; letter-spacing:3px; border-left:5px solid ${t.sectionBar}; padding-left:8px; text-shadow:1px 1px 0 #000; }
  #card-root .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
  #card-root .stat-box { background:rgba(0,0,0,0.40); border:1px solid ${t.statBorder}; border-radius:6px; padding:4px 5px; display:flex; flex-direction:column; align-items:center; }
  #card-root .stat-box.peak { background:${t.peakBg}; border:2px solid ${t.peakBorder}; box-shadow:0 0 10px ${t.peakBorder}66; }
  #card-root .stat-name { color:${t.statName}; font-size:10px; font-weight:900; letter-spacing:0.5px; text-shadow:1px 1px 0 #000; }
  #card-root .stat-val { color:#fff; font-size:20px; font-weight:900; line-height:1.1; text-shadow:2px 2px 0 #000; }
  #card-root .stat-val.s-rank { color:${t.srank}; text-shadow:2px 2px 0 #000,0 0 14px ${t.srankGlow}; }
  #card-root .stat-val.a-rank { color:${t.arank}; text-shadow:2px 2px 0 #000,0 0 10px ${t.arankGlow}; }
  #card-root .pitch-table { width:100%; border-collapse:collapse; table-layout:fixed; }
  #card-root .pitch-table th { color:${t.recLabel}; font-size:10px; font-weight:900; letter-spacing:1px; padding:3px 3px; text-align:right; border-bottom:2px solid ${t.pitchTblBorder}; text-shadow:1px 1px 0 #000; }

// ===== 野手・総合力 加重平均計算 =====
/**
 * 野手（捕手含む）の総合力を加重平均で算出する。
 * 基準値を超える場合は 100 超の値を返す（キャップなし）。
 *
 * 重みの考え方（ミート/パワーを 1.0 とした相対値）:
 *   ミート・パワー      : 1.0
 *   スピード・チャンス・選球眼・三振耐性 : 0.5
 *   守備 DRS (1000inn換算): 0.5  → score = 50 + drs_per1000 × 2.5
 *   対左投手 (±差分)    : 0.25 → score = 50 + vsLeft × 2.5
 *   リード (捕手)        : 1.0  → score = 50 + lead × 5
 *   盗塁阻止率 % (捕手)  : 0.5  → score = csRate × 2
 */
/**
 * WAR 実測値 → 評価スコア変換
 *   WAR=0→40, 1→50, 2→60, ... 6→100, 8→120, 10→140
 *   （一定: warScore = 40 + war × 10）
 * @param {number} war - 実測 WAR 値
 * @returns {number} 評価スコア
 */
function warToScore(war) {
  return 50 + war * 10;
}

/**
 * @param {string|number|null} realWar - スプレッドシートの実測 WAR 値。
 *   '--' または null の場合は WAR なしとして扱い、calcHitterOverall の
 *   加重平均のみを総合力とする。
 */
function calcHitterOverall(row, isCatcher, realWar = null) {
  // ── 能力値（0–100+ の絶対スコア。0はデータなしとして除外） ──
  const meet   = safeNum(row[44]);
  const power  = safeNum(row[45]);
  const speed  = safeNum(row[46]);
  const chance = safeNum(row[47]);
  const eye    = safeNum(row[48]);
  const kres   = safeNum(row[49]);

  // ── 守備 DRS ──
  // 最大イニングのポジション（主ポジ）DRS を基本採用。
  // それ以外でイニングが主ポジの 60% 超のポジションがあれば、それらを含めた最大 DRS を採用。
  // score = 50 + bestDRS × 2.5
  let drsScore = null;
  let defInn = 0;  // 守備イニング合計（盗塁換算にも流用）
  {
    let maxInn = 0;
    const posList = [];
    for (let i = 0; i < 8; i++) {
      const inn = parseFloat(row[28 + i * 2]) || 0;
      const drs = safeNum(row[29 + i * 2]) ?? 0;
      if (inn > 0) {
        defInn += inn;
        posList.push({ inn, drs });
        if (inn > maxInn) maxInn = inn;
      }
    }
    if (posList.length > 0 && maxInn > 0) {
      const primaryDrs = posList.find(p => p.inn === maxInn)?.drs ?? 0;
      let bestDrs = primaryDrs;
      for (const p of posList) {
        if (p.inn > maxInn * 0.6 && p.drs > bestDrs) bestDrs = p.drs;
      }
      drsScore = 50 + bestDrs * 2.5;
    }
  }

  // ── 対左投手: ±差分値 → score = 50 + vsLeft × 2.5 ──
  const vsLeftRaw   = safeNum(row[52]);
  const vsLeftScore = vsLeftRaw !== null ? 50 + vsLeftRaw * 2.5 : null;

  // ── 加重平均 ──
  let wSum = 0, wTotal = 0;
  // 絶対スコア系（0 = データなし として除外）
  const addAbs = (val, w) => {
    if (val !== null && val > 0) { wSum += val * w; wTotal += w; }
  };
  // 変換済みスコア系（負にもなり得るので null チェックのみ）
  const addConv = (val, w) => {
    if (val !== null) { wSum += val * w; wTotal += w; }
  };

  addAbs(meet,              1.5);
  addAbs(power * 1.2,       1.5);  // パワーは1.2倍した値をスコアとして使用
  addAbs(speed,        isCatcher ? 0.25 : 0.5);  // 捕手は走力の重みを低減
  addAbs(chance,       0.5);
  addAbs(eye,          0.5);
  addAbs(kres,         0.5);
  addConv(drsScore,    0.5);
  addConv(vsLeftScore, 0.25);

  // ── 盗塁（500イニング換算）区分線形スコア ──
  // SB=0→40, 10→60, 20→80, 30→100, 40→120, 50→140（+2/盗塁）
  // SB>50→140+(SB-50)×1（+1/盗塁）  重み 0.5
  //
  // 正規化基準: max(守備イニング, 試合数×8.5)
  // DH等で守備イニングが極端に少ない場合も試合数ベースで補正し
  // 「少イニング × 500 = 爆発」を防ぐ
  {
    const rawG    = parseInt(row[6]);
    const gamesInn = (!isNaN(rawG) && rawG >= 10 && rawG <= 162) ? rawG * 8.5 : 0;
    // 守備イニングと試合数推定の大きい方を採用（DH時は試合数ベースが優先される）
    let inn500 = Math.max(defInn, gamesInn);
    if (inn500 > 0) {
      const sbRaw  = getSB(row);
      const sbNorm = sbRaw * 500 / inn500;   // 500イニング換算
      const sbScore = sbNorm <= 50
        ? 40 + sbNorm * 2              // 0〜50 : +2/盗塁
        : 140 + (sbNorm - 50);         // 50超  : +1/盗塁
      addConv(sbScore, isCatcher ? 0.25 : 0.5);  // 捕手は盗塁の重みを低減
    }
  }

  // ── 捕手専用 ──
  if (isCatcher) {
    const lead   = safeNum(row[53]);
    const csRate = safeNum(row[54]);
    if (lead !== null)   addConv((60 + lead * 5) * 1.1, 1.5); // +10→121, 0→66, -10→11
    // 盗塁阻止スコア: 0%→35, 10%→50, 20%→65, 30%→80, 40%→95, 50%→110（+1.5/1%）
    if (csRate !== null) addConv(35 + csRate * 1.5,   1.0);
  }

  const A = wTotal > 0 ? Math.round(wSum / wTotal) : 70;

  // ── WAR 実測値がある場合のみ総合力にブレンド ──
  const warNum = (realWar !== null && realWar !== '--') ? parseFloat(realWar) : NaN;
  if (!isNaN(warNum)) {
    return Math.round((A + warToScore(warNum)) / 2);
  }
  return A;
}

/**
 * 投手総合力スコアを算出する。
 * A = Σ(スコア×重み) / Σ重み → WAR実測値がある場合は野手と同様に (A + warScore) / 2 でブレンド。
 * 通算行では g_careerWAR（IP加重平均）を使用するため異常値にならない。
 * @param {Array} row        - スプレッドシート行
 * @param {number|null} fipValue - FIP値（BR取得 or 計算済み）。null なら row から自動計算。
 * @param {string|number|null} warValue - 実測WAR値（'--' または null の場合はWARなしとして扱う）
 */
function calcPitcherOverall(row, fipValue = null, warValue = null) {
  // ── 能力値（0–100+ の絶対スコア。0はデータなしとして除外） ──
  const ctrl   = safeNum(row[51]);   // 制球
  const change = safeNum(row[52]);   // 緩急
  const ment   = safeNum(row[53]);   // 精神
  const strk   = safeNum(row[54]);   // 奪三振
  const heavy  = safeNum(row[55]);   // 球重

  // ── 対左・対盗塁: ±差分値 → score = 50 + val × 2.5 ──
  const leftRaw  = safeNum(row[56]);
  const baseRaw  = safeNum(row[57]);
  const leftScore = leftRaw  !== null ? 50 + leftRaw  * 2.5 : null;
  const baseScore = baseRaw  !== null ? 50 + baseRaw  * 2.5 : null;

  // ── 総合球威: 球威 × 投球割合 の加重平均（6球種）× 1.25 ──
  let pwrWSum = 0, pwrWTotal = 0;
  for (let i = 0; i < 6; i++) {
    const pwr  = parseFloat(row[59 + i * 3]) || 0;
    const rate = parseFloat(row[60 + i * 3]) || 0;
    if (pwr > 0 && rate > 0) {
      pwrWSum   += pwr * rate;
      pwrWTotal += rate;
    }
  }
  const pitchPowerScore = pwrWTotal > 0 ? (pwrWSum / pwrWTotal) * 1.25 : null;

  // ── FIP スコア（先発/リリーフ判定） ──
  const g  = parseInt(row[6]) || 1;
  const gs = parseInt(row[7]) || 0;
  const isStarterForFIP = gs >= g * 0.4;
  const fipNum = fipValue !== null ? parseFloat(fipValue)
               : (() => { const c = calcFIP(row); return c !== null ? c : NaN; })();
  const fipScore = (!isNaN(fipNum)) ? fipToScore(fipNum, isStarterForFIP) : null;

  // ── 加重平均 A = Σ(スコア×重み) / Σ重み ──
  let wSum = 0, wTotal = 0;
  // 絶対スコア系（0 = データなし として除外）
  const addAbs = (val, w) => {
    if (val !== null && val > 0) { wSum += val * w; wTotal += w; }
  };
  // 変換済みスコア系（負にもなり得るので null チェックのみ）
  const addConv = (val, w) => {
    if (val !== null) { wSum += val * w; wTotal += w; }
  };

  addAbs(ctrl,            1.0);   // 制球
  addAbs(ment,            1.0);   // 精神
  addAbs(strk,            1.0);   // 奪三振
  addAbs(change,          0.5);   // 緩急
  addAbs(heavy,           0.5);   // 球重
  addConv(leftScore,      0.25);  // 対左
  addConv(baseScore,      0.25);  // 対盗塁
  addAbs(pitchPowerScore, 2.5);   // 総合球威（×1.25済み）
  addAbs(fipScore,        2.0);   // FIP スコア

  const A = wTotal > 0 ? Math.round(wSum / wTotal) : 70;

  // ── WAR 実測値がある場合のみ総合力にブレンド（先発投手のみ）──
  // リリーフ投手は WAR の歪みが大きいため能力加重平均 A をそのまま返す
  // 通算行は IP加重平均WAR（g_careerWAR）が渡されるため異常値にならない
  const warNum = (warValue !== null && warValue !== '--')
    ? parseFloat(String(warValue).replace('~', ''))
    : NaN;
  if (!isNaN(warNum) && isStarterForFIP) {
    return Math.round((A * 3 + warToScore(warNum)) / 4);
  }
  return A;
}

// ===== CARD HTML BUILDERS =====
function buildStatBox(label, value) {
  const rank = statRank(value);
  const peak = isPeak(value);
  // 3桁以上はフォントを少し小さく
  const sizeStyle = value >= 100 ? ' style="font-size:16px;"' : '';
  return `<div class="stat-box${peak ? ' peak' : ''}"><span class="stat-name">${label}</span><span class="stat-val${rank ? ' ' + rank : ''}"${sizeStyle}>${value}</span></div>`;
}

function buildPitchPointBox(label, value) {
  if (value === null || value === undefined) {
    return `<div class="pitch-box neu-b"><span class="pitch-lbl">${label}</span><span class="pitch-v neu">±0</span></div>`;
  }
  const cls  = value > 0 ? 'pos' : value < 0 ? 'neg' : 'neu';
  const disp = value > 0 ? '+' + value : value === 0 ? '±0' : String(value);
  return `<div class="pitch-box ${cls}-b"><span class="pitch-lbl">${label}</span><span class="pitch-v ${cls}">${disp}</span></div>`;
}

function buildDrsSection(drsData) {
  if (!drsData || drsData.length === 0) return '';
  const isMulti = drsData.length >= 5;
  const barClass = isMulti ? 'drs-bar drs-multi' : 'drs-bar drs-single';
  const items = drsData.map((d, i) => {
    const n = safeNum(d.drs) || 0;
    const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu';
    const disp = n > 0 ? '+' + n : n === 0 ? '±0' : String(n);
    // 2列グリッド時はdividerなし、1列時はdividerあり
    const sep = (!isMulti && i > 0) ? '<div class="drs-div"></div>' : '';
    return sep + `<div class="drs-item"><span class="drs-pos">${d.pos}</span><span class="drs-num ${cls}">${disp}</span><span class="drs-inn">${d.inn} inn</span></div>`;
  }).join('');
  return `<div class="${barClass}">${items}</div>`;
}

// ===== PITCHER CARD BUILDER =====
function buildPitcherCard(row, headers, photoURL, t, isPeakYear, nameEn) {
  const name   = row[0] || '---';
  const year   = row[1] || '';
  const teamCode = String(row[2] || '').toUpperCase();
  const wins   = row[3] || 0;
  const losses = row[4] || 0;
  const era    = row[5] || '--';
  const totalG = row[6] || 0;
  const gs     = row[7] || 0;
  const ip     = row[10] || '--';
  const k      = row[15] || 0;
  const whip   = row[17] || '--';
  const sv     = getFirstColVal(row, headers[0], ['SV','セーブ','Saves','Save','S']);
  const war    = fmtWAR(resolveWAREffective(row, headers[0], true));

  const stam   = row[50] || 0, ctrl   = row[51] || 0, change = row[52] || 0,
        ment   = row[53] || 0, strk   = row[54] || 0, heavy  = row[55] || 0;

  // 球種名: 各スロットのヘッダーを優先し、なければデフォルト名にフォールバック
  const pitchNames = ['フォーシーム','スライダー','チェンジアップ','カーブ','カットボール','ツーシーム','スプリット'];
  const finalPitchNames = pitchNames.map((def, i) => {
    const h = headers[0][58 + i * 3];
    return (h != null && String(h).trim()) ? String(h).trim() : def;
  });

  const pitches = [];
  for (let i = 0; i < 6; i++) {
    const speed = row[58 + i * 3];
    const power = row[59 + i * 3];
    const rate  = row[60 + i * 3];
    if (speed != null && rate != null && rate > 0) {
      pitches.push({ name: finalPitchNames[i] || pitchNames[i], speed, power, rate });
    }
  }

  // FIP: BR取得値 → 計算値 の優先順で渡す
  const _fipForOverall = (() => {
    const brF = getBRefFIP(String(year));
    if (brF !== null) return parseFloat(brF);
    return calcFIP(row);
  })();
  // WAR: 通算行は resolveWAREffective が g_careerWAR（IP加重平均）を返す
  const _warForOverall = resolveWAREffective(row, headers[0], true);
  const overallScore = calcPitcherOverall(row, _fipForOverall, _warForOverall);

  const isStarter   = gs >= totalG * 0.5;
  const posBadge    = isStarter ? '先発投手' : 'リリーフ';
  const cardTypeLabel = isStarter
    ? (strk >= 90 ? '先発エース' : '先発投手')
    : (strk >= 90 ? 'クローザー' : 'リリーフ');

  const teamStyle    = getTeamStyle(teamCode);
  const teamBadgeHtml = `<div class="team-badge" style="background:${teamStyle.bg};border:2px solid ${teamStyle.border};text-shadow:1px 1px 0 #000,0 0 8px ${teamStyle.glow};">${teamCode === 'NEW' ? 'NYY' : teamCode}</div>`;

  // 初期列伝（統計ベース、後でAI上書き）
  const retsudenText = `${year}年、防御率 ${era}、${wins}勝${losses}敗、奪三振 ${k}、WHIP ${whip}、${ip}回投球。` +
    `スタミナ${stam}・制球${ctrl}・緩急${change}・精神${ment}・奪三振${strk}・球重${heavy}。`;

  const leftVal  = safeNum(row[56]);
  const baseVal  = safeNum(row[57]);
  const statBoxes = [
    buildStatBox('スタミナ', stam),
    buildStatBox('制　球',   ctrl),
    buildStatBox('緩　急',   change),
    buildStatBox('精　神',   ment),
    buildStatBox('奪三振',   strk),
    buildStatBox('球　重',   heavy),
    leftVal  !== null
      ? buildStatBox('対　左', leftVal)
      : `<div class="stat-box"><span class="stat-name">対　左</span><span class="stat-val" style="font-size:14px;color:#888">--</span></div>`,
    baseVal !== null
      ? buildStatBox('対盗塁', baseVal)
      : `<div class="stat-box"><span class="stat-name">対盗塁</span><span class="stat-val" style="font-size:14px;color:#888">--</span></div>`,
  ].join('');

  const pitchRows = pitches.map(p =>
    `<tr><td class="pn" data-pitch="${escapeHtml(p.name)}">${p.name}</td><td class="ps">${p.speed}</td><td class="pp2">${p.power}</td><td class="pr">${fmtPct(p.rate)}</td></tr>`
  ).join('');

  const photoSrc   = photoURL ? `<img src="${photoURL}" alt="${name}" onerror="this.style.display='none'">` : '';
  const seasonLabel = isPeakYear ? `${year} PEAK` : `${year}`;

  return `
    <div class="top-banner">
      <span class="banner-left"><span class="card-rank">${t.rank}</span><span class="stars">${t.stars}</span></span>
      <span class="banner-awards" style="display:none;"></span>
      <span class="card-type">${cardTypeLabel}</span>
    </div>
    <div class="left-panel">
      <div class="photo-frame">${photoSrc}</div>
      <div class="photo-top-fade"></div><div class="photo-bot-fade"></div><div class="photo-side-fade"></div>
      ${teamBadgeHtml}
      <div class="power-display">
        <span class="power-label">総合力</span>
        <span class="power-value" style="${overallScore >= 100 ? 'font-size:26px;' : ''}">${overallScore}</span>
      </div>
      <div class="player-name-block">
        <span class="player-name-ja">${name}</span>
        ${nameEn ? `<span class="player-name-en">${escapeHtml(nameEn)}</span>` : ''}
      </div>
    </div>
    <div class="right-panel">
      <div class="header-row">
        <span class="position-badge">${posBadge}</span>
        <span class="player-full-name">${name}</span>
        <span class="season-badge">${seasonLabel}</span>
      </div>
      <div class="record-bar">
        <div class="rec-item"><span class="rec-label">防御率</span><span class="rec-val hl">${era}</span></div>
        <div class="rec-item"><span class="rec-label">勝利</span><span class="rec-val hl">${wins}</span></div>
        <div class="rec-item"><span class="rec-label">敗北</span><span class="rec-val">${losses}</span></div>
        <div class="rec-item"><span class="rec-label">セーブ</span><span class="rec-val pp">${sv}</span></div>
        <div class="rec-item"><span class="rec-label">イニング</span><span class="rec-val sm">${ip}</span></div>
        <div class="rec-item"><span class="rec-label">奪三振</span><span class="rec-val pp">${k}</span></div>
        <div class="rec-item"><span class="rec-label">WAR</span><span class="rec-val hl">${war}</span></div>
      </div>
      <div class="sec-title">■ ゲームステータス</div>
      <div class="stats-grid">${statBoxes}</div>
      <div class="sec-title">■ 球種データ</div>
      <table class="pitch-table">
        <thead><tr><th style="text-align:left;">球種</th><th style="width:18%;">球速</th><th style="width:18%;">球威</th><th style="width:18%;">割合</th></tr></thead>
        <tbody>${pitchRows}</tbody>
      </table>
      <div class="retsuden" id="retsuden-area"><strong>【列伝】</strong> <span class="ai-loading">AI生成中...</span></div>
    </div>`;
}

// ===== HITTER CARD BUILDER =====
function buildHitterCard(row, headers, photoURL, t, isCatcher, isPeakYear, nameEn) {
  const name     = row[0] || '---';
  const year     = row[1] || '';
  const teamCode = String(row[2] || '').toUpperCase();
  const avg  = fmtRate(row[15]);
  const obp  = fmtRate(row[16]);
  const ops  = fmtOPS(row[17]);
  const hr   = row[9]  || 0;
  const rbi  = row[10] || 0;
  const sb   = getSB(row, headers[0]);
  const war  = fmtWAR(resolveWAREffective(row, headers[0], false));

  const meet  = row[44] || 0, power  = row[45] || 0, speed  = row[46] || 0,
        chance = row[47] || 0, eye   = row[48] || 0, kres   = row[49] || 0,
        steal  = row[51] || 0, vsLeft = row[52] || 0;
  const lead   = row[53], csRate = row[54];

  const pitchLabels = ['FB','2C','CT','SL','CB','CH','SF'];
  const pitchVals   = pitchLabels.map((lbl, i) => ({ lbl, val: safeNum(row[55 + i]) }));
  const allPitchNull = pitchVals.every(p => p.val === null);

  const posLabels = ['C','1B','2B','3B','SS','LF','CF','RF'];
  const drsData   = [];
  for (let i = 0; i < 8; i++) {
    const inn = row[28 + i * 2];
    const drs = row[29 + i * 2];
    if (inn && inn !== '--' && inn !== null && inn !== '') {
      drsData.push({ pos: posLabels[i], inn: String(inn), drs: safeNum(drs) || 0 });
    }
  }

  let primaryPos = 'RF';
  if (drsData.length > 0) {
    primaryPos = drsData.reduce((a, b) => parseFloat(a.inn) >= parseFloat(b.inn) ? a : b).pos;
  }
  const posJa = { 'C':'捕手','1B':'一塁手','2B':'二塁手','3B':'三塁手','SS':'遊撃手','LF':'左翼手','CF':'中堅手','RF':'右翼手' };
  const posBadge = isCatcher ? '捕手' : (posJa[primaryPos] || '野手');

  const realWar = resolveWAREffective(row, headers[0], false);  // 実測値 or 推定値（通算行は加重平均）
  const overallScore = calcHitterOverall(row, isCatcher, realWar);

  let cardTypeLabel;
  if (isCatcher)       cardTypeLabel = power >= 85 ? '大砲捕手' : '守備型捕手';
  else if (power >= 100) cardTypeLabel = 'スラッガー';
  else if (speed >= 80)  cardTypeLabel = '俊足外野手';
  else if (eye >= 85)    cardTypeLabel = 'OBP型打者';
  else                   cardTypeLabel = '野手';

  const teamStyle    = getTeamStyle(teamCode);
  const teamBadgeHtml = `<div class="team-badge" style="background:${teamStyle.bg};border:2px solid ${teamStyle.border};text-shadow:1px 1px 0 #000,0 0 8px ${teamStyle.glow};">${teamCode === 'NEW' ? 'NYY' : teamCode}</div>`;

  const statBoxes = [
    buildStatBox('ミート',   meet),
    buildStatBox('パワー',   power),
    buildStatBox('スピード', speed),
    buildStatBox('チャンス', chance),
    buildStatBox('選球眼',   eye),
    buildStatBox('三振耐性', kres),
    buildStatBox('盗塁能',   steal),
    buildStatBox('対左投手', vsLeft),
  ].join('');

  const pitchBoxes = pitchVals.map(p => buildPitchPointBox(p.lbl, p.val)).join('');

    const catDrs = topDrs.length > 0
      ? buildDrsSection(topDrs)
      : `<div class="drs-bar"><div class="drs-item"><span class="drs-pos">C</span><span class="drs-num neu">±0</span></div></div>`;
    const leadDisp = lead   !== null && lead   !== undefined ? lead   : 0;
    const csDisp   = csRate !== null && csRate !== undefined ? csRate : '--';
    // 守備DRSと捕手能力を横並び1行で表示
    defSection = `
      <div class="combo-row" style="align-items:center;">
        <div style="display:flex;flex-direction:column;gap:2px;flex:1;">
          <div class="sec-title">■ 守備 DRS</div>
          ${catDrs}
        </div>
        <div style="display:flex;flex-direction:column;gap:2px;flex:1.2;">
          <div class="sec-title">■ 捕手能力</div>
          <div class="catcher-bar" style="padding:4px 8px;">
            <div class="ca-item">
              <span class="ca-label">リード</span>
              <span class="ca-val lead" style="font-size:20px;">${leadDisp}</span>
            </div>
            <div class="ca-item">
              <span class="ca-label">阻止率</span>
              <span class="ca-val cs" style="font-size:20px;">${csDisp}</span>
              <span class="ca-unit">%</span>
            </div>
          </div>
        </div>
      </div>`;
  } else {
    defSection = `
      <div class="sec-title">■ 守備 DRS</div>
      ${drsData.length > 0
        ? buildDrsSection(drsData)
        : '<div class="drs-bar"><span style="color:#888;font-size:11px;">データなし</span></div>'}`;
  }

  const opsNum      = parseFloat(ops);

    : '';
  const seasonLabel  = isPeakYear ? `${year} ${seasonSuffix}` : `${year}`;
  const photoSrc     = photoURL ? `<img src="${photoURL}" alt="${name}" onerror="this.style.display='none'">` : '';

  return `
    <div class="top-banner">
      <span class="banner-left"><span class="card-rank">${t.rank}</span><span class="stars">${t.stars}</span></span>
      <span class="banner-awards" style="display:none;"></span>
      <span class="card-type">${cardTypeLabel}</span>
    </div>
    <div class="left-panel">
      <div class="photo-frame">${photoSrc}</div>
      <div class="photo-top-fade"></div><div class="photo-bot-fade"></div><div class="photo-side-fade"></div>
      ${teamBadgeHtml}

function onExcelChange(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb   = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
      if (rows.length < 3) return;

      g_rows     = rows;
      g_headers  = rows.slice(0, 2);
      g_dataRows = rows.slice(2).filter(r => r[0] && r[0] !== null);
      g_isPitcher = rows[0][3] === '勝利' || rows[0][3] === '勝';
      g_isCatcher = !g_isPitcher && g_dataRows.some(r =>
        r[53] !== null && r[53] !== undefined && r[53] !== '--' && String(r[53]).trim() !== '');

      // ピーク年検出
      let peakRow;
      if (g_isPitcher) {
        peakRow = g_dataRows.reduce((best, r) => {
          const era = parseFloat(r[5]), bestEra = parseFloat(best[5]);
          return (!isNaN(era) && (isNaN(bestEra) || era < bestEra)) ? r : best;
        }, g_dataRows[0]);
      } else {
        peakRow = g_dataRows.reduce((best, r) => {
          const opsCur = parseFloat(fmtOPS(r[17])) || 0;
          const opsBest = parseFloat(fmtOPS(best[17])) || 0;
          return opsCur > opsBest ? r : best;
        }, g_dataRows[0]);
      }
      g_peakYear = peakRow ? peakRow[1] : null;

      // ドロップダウン生成
      const sel = document.getElementById('year-select');
      sel.innerHTML = '';
      g_dataRows.forEach(r => {
        const yr  = r[1];
        const opt = document.createElement('option');
        opt.value = yr;
        opt.textContent = yr + '年' + (yr == g_peakYear ? ' ★ピーク' : '');
        if (yr == g_peakYear) opt.style.color = '#ffcc44';
        sel.appendChild(opt);
      });
      sel.value = g_peakYear;

      // 年代情報更新
      updateYearInfo(g_peakYear);

      // 年代選択パネル・BRef IDパネルを表示
      document.getElementById('year-selector-section').style.display = 'flex';
      document.getElementById('bref-section').style.display = 'block';
    } catch(err) {
      console.warn('Excel先読みエラー:', err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── MLB Stats API からシーズン成績・受賞歴を取得 ────────────────
async function fetchMlbSeasonData(mlbId, year, isPitcher) {
  if (!mlbId) return { stats: {}, awards: [] };
  try {
    const group = isPitcher ? 'pitching' : 'hitting';
    const [statsRes, awardsRes] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/people/${mlbId}/stats?stats=season&season=${year}&group=${group}&sportId=1`),
      fetch(`https://statsapi.mlb.com/api/v1/people/${mlbId}/awards`)
    ]);
    const statsData  = statsRes.ok  ? await statsRes.json()  : {};
    const awardsData = awardsRes.ok ? await awardsRes.json() : {};

    const seasonStats = statsData?.stats?.[0]?.splits?.[0]?.stat || {};

    // 受賞歴をシーズンでフィルタ（nameとidの両方を保持）
    const allAwards = awardsData?.awards || [];
    const yearAwards = allAwards
      .filter(a => {
        const s = a.season || (a.date ? String(a.date).substring(0,4) : '');
        return s === String(year);
      })
      .map(a => ({ name: a.name || '', id: a.id || '' }))
      .filter(a => a.name || a.id);

    return { stats: seasonStats, awards: yearAwards };
  } catch (e) {
    console.warn('MLB Stats API 取得エラー:', e.message);
    return { stats: {}, awards: [] };
  }
}

/**
 * キャリア全受賞歴を一括取得して _awardsJaByYear に年度別に格納する。
 * 通算カード表示時に呼ぶことで、個別年度を見ていなくても表示できるようにする。
 */
async function _fetchAndCacheAllAwards(mlbId) {
  if (!mlbId) return;
  try {
    const res = await fetch(`https://statsapi.mlb.com/api/v1/people/${mlbId}/awards`);
    if (!res.ok) return;
    const data = await res.json();
    const allAwards = data?.awards || [];
    allAwards.forEach(a => {
      const year = String(a.season || (a.date ? String(a.date).substring(0,4) : ''));
      if (!/^\d{4}$/.test(year)) return;
      const award = { name: a.name || '', id: a.id || '' };
      const ja = awardToJa(award);
      if (!ja) return;
      if (!_awardsJaByYear[year]) _awardsJaByYear[year] = [];
      if (!_awardsJaByYear[year].includes(ja)) _awardsJaByYear[year].push(ja);
    });
    console.log('[CareerAwards] 全受賞歴キャッシュ完了:', Object.keys(_awardsJaByYear));
  } catch(e) {
    console.warn('[CareerAwards] 取得エラー:', e.message);
  }
}

// ── 受賞名（英語）→日本語変換 ────────────────────────────────
function awardToJa(award) {
  const n = (award.name || award.id || '').toLowerCase();

  // ① 月間・週間・オールスター等のシーズン外小賞は即スキップ（nullを返す）
  if (n.includes('player of the month') || n.includes('player of the week')) return null;
  if (n.includes('all-star game mvp') || n.includes('allstar game mvp'))    return null;
  if (n.includes('minor league') || n.includes('milb') ||
      n.includes('triple-a')    || n.includes('double-a'))                  return null;

  // ② リーグ識別
  const isAL = n.includes('american league') || n.includes(' al ') || n.startsWith('al ');
  const isNL = n.includes('national league')  || n.includes(' nl ') || n.startsWith('nl ');
  const lg   = isAL ? 'AL' : isNL ? 'NL' : '';

  // ③ 具体的なMVP種別を「リーグMVP」より先にチェック（順序が重要！）
  if (n.includes('world series') && n.includes('mvp'))  return 'ワールドシリーズMVP';
  if (n.includes('championship series'))                return 'リーグ優勝シリーズMVP';
  if (n.includes('all-star') || n.includes('allstar'))  return null; // オールスター選出は表示しない

  // ④ リーグMVP（シーズンMVPのみ）
  // AL/NLまたはBBWAAの明記がないMVPはチーム賞・球団賞として除外する
  if (n.includes('most valuable player') || n.includes('mvp')) {
    if (!isAL && !isNL && !n.includes('bbwaa')) return null;
    return lg ? `${lg} MVP` : 'MVP';
  }

  // ⑤ その他タイトル・表彰
  if (n.includes('cy young'))
    return lg ? `${lg}サイ・ヤング賞` : 'サイ・ヤング賞';
  if (n.includes('rookie of the year') || n.includes('rookie'))
    return lg ? `${lg}新人王` : '新人王';
  if (n.includes('gold glove'))           return 'ゴールドグラブ賞';
  if (n.includes('silver slugger'))       return 'シルバースラッガー賞';
  if (n.includes('hank aaron'))           return 'ハンク・アーロン賞';
  if (n.includes('roberto clemente'))     return 'ロベルト・クレメンテ賞';
  if (n.includes('comeback player'))      return 'カムバック賞';
  if (n.includes('reliever'))             return 'リリーバー賞';
  if (n.includes('batting title'))        return '首位打者';
  if (n.includes('home run') && n.includes('leader')) return '本塁打王';
  return award.name || award.id || '';
}

// ── 称号（cardType）を決定 ────────────────────────────────────
function buildCardType(row, awardsJa) {
  const hr  = parseInt(row[9])  || 0;
  const k   = parseInt(row[15]) || 0;
  const era = parseFloat(row[5]) || 99;
  const wins= parseInt(row[3])  || 0;
  const gs  = parseInt(row[7])  || 0;
  const tg  = parseInt(row[6])  || 1;
  const isStarter = g_isPitcher && gs >= tg * 0.5;
  const hand = String(row[57] || '').toUpperCase().includes('L') ? '左腕' : '右腕';
  const ops  = parseFloat(fmtOPS(row[17])) || 0;
  const pos  = g_mlbPos || '';
  const posMap = { P:'投手',C:'捕手','1B':'一塁手','2B':'二塁手','3B':'三塁手',
    SS:'遊撃手',LF:'左翼手',CF:'中堅手',RF:'右翼手',DH:'指名打者',OF:'外野手' };
  const posJa = posMap[pos.toUpperCase()] || '';

  const mvp  = awardsJa.find(a => a.includes('MVP') && !a.includes('ワールドシリーズ') && !a.includes('リーグ優勝'));
  const cy   = awardsJa.find(a => a.includes('サイ・ヤング'));
  const ws   = awardsJa.find(a => a.includes('ワールドシリーズMVP'));
  const rook = awardsJa.find(a => a.includes('新人王'));

  // ① WS MVP
  if (ws) return 'ワールドシリーズMVP';
  // ② MVP
  if (mvp) {
    if (!g_isPitcher && hr >= 60) return '本塁打記録MVP';
    if (!g_isPitcher && hr >= 40) return `MVP${posJa || '打者'}`;
    if (!g_isPitcher)             return `${mvp}${posJa ? '・' + posJa : ''}`;
    return `MVP${hand}`;
  }
  // ③ サイ・ヤング
  if (cy) return cy.replace('賞','') + `・${hand}`;
  // ④ 新人王
  if (rook) return rook;
  // ⑤ 記録から生成
  if (!g_isPitcher) {
    const games = parseInt(row[6]) || 0;
    const hasEnoughGames = games >= 80;
    const sb  = getSB(row);
    const rbi = parseInt(row[10]) || 0;
    const avg = parseFloat(String(fmtRate(row[15])).replace(/^\./,'0.')) || 0;

    // タイトル有無フラグ（awardsJa から判定）
    // ※ SB・CSR はボーナステーブルでは3だが肩書優先度では2相当に調整
    const hasAVG = awardsJa.some(a => a.includes('首位打者'));
    const hasHR  = awardsJa.some(a => a.includes('本塁打王'));
    const hasRBI = awardsJa.some(a => a.includes('打点王'));
    const hasOPS = awardsJa.some(a => a.includes('OPS首位'));
    const hasSB  = awardsJa.some(a => a.includes('盗塁王'));
    const hasGG  = awardsJa.some(a => a.includes('ゴールドグラブ'));
    const hasSS  = awardsJa.some(a => a.includes('シルバースラッガー'));
    const hasCSR = awardsJa.some(a => a.includes('盗塁阻止率'));
    const hasHAA = awardsJa.some(a => a.includes('ハンク・アーロン'));
    const hasRC  = awardsJa.some(a => a.includes('ロベルト・クレメンテ'));
    const hasCB  = awardsJa.some(a => a.includes('カムバック'));

    // ① 歴史的本塁打記録（60本超=当時の記録水準を上回る偉業。二冠王より優先）
    if (hr >= 73) return '本塁打記録男';          // ボンズの現行全体記録
    if (hr >= 62) return `${hr}本塁打・AL新記録`; // ジャッジのAL記録(2022)
    if (hr >= 60) return `${hr}HR王`;              // ルースの旧記録を超える歴史的偉業

    // ② 三冠王・二冠王（首位打者・本塁打王・打点王の組み合わせ）＋ポジション名
    const crownCount = [hasAVG, hasHR, hasRBI].filter(Boolean).length;
    const crownPos = posJa || '';
    if (crownCount === 3) return `三冠王${crownPos}`;
    if (crownCount === 2) return `二冠王${crownPos}`;

    // ③ 個別タイトルから肩書（優先度: HR=AVG=RBI=OPS=SB=GG=SS=CSR=2 > HAA=RC=CB=1）
    if (hasHR)  return hr >= 40 ? `${hr}本塁打王` : '本塁打王';
    if (hasAVG) return `打率${fmtRate(row[15])}首位打者`;
    if (hasRBI) return `${rbi}打点王`;
    if (hasOPS) return 'OPS王';
    if (hasSB)  return sb >= 50 ? `${sb}盗塁王` : '盗塁王';
    if (hasCSR && g_isCatcher) return '盗塁阻止率No.1捕手';
    if (hasGG)  return `ゴールドグラブ${posJa || '野手'}`;
    if (hasSS)  return `シルバースラッガー${posJa || '野手'}`;
    if (hasHAA) return 'ハンク・アーロン賞';
    if (hasRC)  return 'クレメンテ賞';
    if (hasCB)  return 'カムバック賞';

    // ③.5 タイトルなし・規定打席以上でリーグ5位以内の成績があれば肩書に反映
    if (hasEnoughGames) {
      const yearKey = String(row[1] ?? '').trim();
      const rd = _rankDataByYear[yearKey] || {};
      // rank 2〜5 のみ（1位はタイトルとして③で処理済み）
      const pick = (key, labelFn) => {
        const r = rd[key]?.rank;
        return (r && r >= 2 && r <= 5) ? labelFn(r) : null;
      };
      // 優先順: HR > AVG > RBI > OPS > OBP > SB
      const rankLabel =
        pick('hr',  r => `リーグ本塁打${r}位の強打者`)  ||
        pick('avg', r => `リーグ打率${r}位の巧打者`)     ||
        pick('rbi', r => `リーグ打点${r}位の強打者`)     ||
        pick('ops', r => `リーグOPS${r}位打者`)          ||
        pick('obp', r => `リーグ出塁率${r}位打者`)       ||
        pick('sb',  r => `リーグ盗塁${r}位の俊足選手`);
      if (rankLabel) return rankLabel;
    }

    // ④ タイトルなし → 数字ベース（50本台はここで処理）
    if (hr >= 50 && hasEnoughGames) return `${hr}本塁打達成`;
    if (hr >= 40 && hasEnoughGames) return `${hr}本塁打の強打者`;
    if (ops >= 1.20 && hasEnoughGames) return 'OPS怪物打者';
    if (ops >= 1.00 && hasEnoughGames) return '勝負強打者';
    if (avg >= 0.370 && hasEnoughGames) return '首位打者候補';
    if (avg >= 0.340 && hasEnoughGames) return `打率${fmtRate(row[15])}の巧打者`;
    if (sb >= 60) return `${sb}盗塁の俊足選手`;
    if (sb >= 40 && hasEnoughGames) return `${sb}盗塁の俊足選手`;
    if (rbi >= 140) return `${rbi}打点の勝負強打者`;
    if (rbi >= 100 && hasEnoughGames) return `${rbi}打点の勝負強打者`;
    if (hr >= 20 && hasEnoughGames) return `${hr}本塁打の強打者`;
    if (sb >= 20 && hasEnoughGames) return `${sb}盗塁の俊足選手`;
    if (avg >= 0.300 && hasEnoughGames) return `打率${fmtRate(row[15])}の巧打者`;

    // ⑤ 試合数不足 or 特徴なし → ポジション名
    return posJa || '野手';
  } else {
    const hasKTitle   = awardsJa.some(a => a.includes('奪三振王'));
    const hasEraTitle = awardsJa.some(a => a.includes('最優秀防御率'));
    const hasWTitle   = awardsJa.some(a => a.includes('最多勝'));
    const hasSvTitle  = awardsJa.some(a => a.includes('最多セーブ'));
    const hasHldTitle = awardsJa.some(a => a.includes('最多ホールド'));

    // ① 奪三振数が極めて多い
    if (k >= 300) return `${k}奪三振${hand}`;
    if (k >= 250) {
      if (hasKTitle) return `奪三振王${hand}`;
      // タイトルなし → ランクデータで事実ベース表示
      const yearKey = String(row[1] ?? '').trim();
      const kRank = _rankDataByYear[yearKey]?.k?.rank;
      if (kRank && kRank <= 5) return `奪三振リーグ${kRank}位${hand}`;
      return `${k}奪三振${hand}`;
    }
    // ② 突出した防御率（タイトル有無問わず）
    if (era < 1.80 && gs > 10) return `防御率${row[5]}の${hand}`;
    // ③ 多勝
    if (wins >= 22) return `${wins}勝${hand}`;
    // ④ タイトルから肩書を生成（ERA > W > K > SV > HLD の優先順）
    if (hasEraTitle) return `最優秀防御率${hand}`;
    if (hasWTitle)   return `最多勝${hand}`;
    if (hasKTitle)   return `奪三振王${hand}`;
    if (hasSvTitle)  return `最多セーブ投手`;
    if (hasHldTitle) return `最多ホールド投手`;
    // ⑤ クローザー実績（タイトルなし）
    if (!isStarter && era < 2.20) return '不滅の守護神';
    // ⑥ その他のタイトルがあれば手腕を付けて整形
    if (awardsJa.length) {
      const a = awardsJa[0];
      return (a.includes('右腕') || a.includes('左腕') || a.includes('投手'))
        ? a : `${a}の${hand}`;
    }
    // ⑦ タイトルなし → 勝利数＋手腕
    return `${wins}勝${hand}投手`;
  }
}

/** 通算成績の歴代順位を返す（1〜10位、圏外は null） */
function _mlbCareerRank(category, value) {
  const tbl = _MLB_RANKS[category];
  if (!tbl || value == null) return null;
  for (let i = 0; i < tbl.length; i++) {
    if (value >= tbl[i]) return i + 1;
  }
  return null;
}

/** 順位テキスト（1位→"歴代最多"、2位以降→"歴代N位"） */
function _rankLabel(r) { return r === 1 ? '歴代最多' : `歴代${r}位`; }

// 数値をそのまま出さず「圧倒的な球威を誇る」等の定性表現に変換
function _pwrDesc(power) {
  if (power >= 95) return '圧倒的な球威を誇る';
  if (power >= 88) return '鋭い球威を持つ';
  if (power >= 80) return '球威ある';
  return '切れ味ある';
}
// 修飾語として前置きするバージョン（「球威抜群の」等）
function _pwrAdj(power) {
  if (power >= 95) return '球威抜群の';
  if (power >= 88) return '球威ある';
  if (power >= 80) return '鋭い';
  return '';
}

  if (!nameEn) return null;
  const key = nameEn.toLowerCase().trim();
  if (_PLAYER_NICKNAMES[key]) return _PLAYER_NICKNAMES[key];
  for (const [k, v] of Object.entries(_PLAYER_NICKNAMES)) {

  return null;
}

// ※ 正規表現マッチ順（具体的なパターンを先に書く必要あり。ここは変更しない）
const _AWARD_ABBR_LIST = [
  [/ワールドシリーズMVP/,      'WSMVP'],   // WS MVP（先にマッチさせる）
  [/リーグ優勝シリーズMVP/,    'LCSMVP'],  // LCS MVP

  [/^(AL |NL )?MVP$|最優秀選手/, 'MVP'],
  [/サイ・ヤング/,              'CY'],
  [/新人王/,                    'ROY'],
  [/首位打者/,                  'AVG'],
  [/最優秀防御率/,              'ERA'],
  [/本塁打王/,                  'HR'],
  [/打点王/,                    'RBI'],
  [/盗塁王/,                    'SB'],
  [/奪三振王/,                  'K'],
  [/最多勝/,                    'W'],
  [/最多セーブ/,                'SV'],
  [/最多ホールド/,              'HLD'],
  [/OPS首位/,                   'OPS'],
  // 個人表彰・特別賞（通常タイトルの後に表記）
  [/ハンク・アーロン/,          'HAA'],
  [/ロベルト・クレメンテ/,      'RC'],
  [/カムバック/,                'CB'],
  [/ゴールドグラブ/,            'GG'],   // awardToJa は 'ゴールドグラブ賞' を返すので要一致
  [/シルバースラッガー/,        'SS'],
  [/盗塁阻止率No\.1|盗塁阻止率リーグ1位/, 'CSR'],  // 捕手専用：盗塁阻止率リーグNo.1
];
// ── 表示優先度（マッチ順とは独立。小さいほど先に表示）──
// MVP 最優先 → 主要タイトル → 特別賞（HAA/RC/CB）→ 個人守備・打撃表彰（GG/SS）
const _AWARD_PRIORITY = {
  MVP: 0, WSMVP: 1, LCSMVP: 2,
  CY: 3, ROY: 4,
  AVG: 10, ERA: 11, HR: 12, RBI: 13, SB: 14,
  K: 15, W: 16, SV: 17, HLD: 18, OPS: 19,
  HAA: 25, RC: 26, CB: 27,
  GG: 30, SS: 31,
  CSR: 32,  // 捕手：盗塁阻止率No.1
};
// バナーに表示しない（軽微）なアワード
// バナーに表示しない軽微・重複アワード（awardToJaがnullを返す設計に移行済みだが念のため）
const _AWARD_SKIP_RE = /週間|月間|オールスター/;

function _abbrevAward(awardJa) {
  if (_AWARD_SKIP_RE.test(awardJa)) return null;
  for (const [re, abbr] of _AWARD_ABBR_LIST) {
    if (re.test(awardJa)) return abbr;
  }
  return null;
}

/**
 * バナー表示用アワードテキストを生成。
 * isCareer=true の通算行では _awardsJaByYear + _rankDataByYear から集計し「ERA2 K1」形式で返す。
 * isCareer=false の年度行では当年のawardsJaから「CY ERA K」形式で返す。
 */
function _bannerAwardsText(awardsJa, isCareer) {
  if (!isCareer) {
    // 年度カードも優先度順でソート（MVP が先頭に来るよう）
    const abbrs = [...new Set((awardsJa || []).map(_abbrevAward).filter(Boolean))]
      .sort((a, b) => (_AWARD_PRIORITY[a] ?? 99) - (_AWARD_PRIORITY[b] ?? 99));
    return abbrs.join(' ');
  }

  // 通算: 全年度の受賞歴を集計
  const countMap = {};

  // ① _awardsJaByYear に蓄積された受賞歴を集計
  Object.values(_awardsJaByYear).forEach(awards => {
    awards.forEach(a => {
      const abbr = _abbrevAward(a);
      if (abbr) countMap[abbr] = (countMap[abbr] || 0) + 1;
    });
  });

  // ② _rankDataByYear のrank=1を補完（統計タイトル：HR/RBI等は/awardsに含まれないため常に全年度チェック）
  // ※ 旧ロジック「_awardsJaByYear[year]があればスキップ」は通算カードで全年度がスキップされ
  //    HR・RBIが永遠に反映されないバグの原因だったため廃止。
  //    代わりに、同じ略称が既にその年の_awardsJaByYearで計上済みなら加算しないことで二重計上を防ぐ。
  const rankKeyMap = { era:'ERA', k:'K', wins:'W', sv:'SV', hld:'HLD', avg:'AVG', hr:'HR', rbi:'RBI', ops:'OPS', sb:'SB' };
  Object.entries(_rankDataByYear).forEach(([year, rd]) => {
    // その年度の/awardsデータから既に計上済みの略称セットを作る（二重計上防止）
    const alreadyCounted = new Set(
      (_awardsJaByYear[year] || []).map(a => _abbrevAward(a)).filter(Boolean)
    );
    Object.entries(rankKeyMap).forEach(([key, abbr]) => {
      if (rd[key]?.rank === 1 && !alreadyCounted.has(abbr)) {
        countMap[abbr] = (countMap[abbr] || 0) + 1;
      }
    });
  });

  if (!Object.keys(countMap).length) return '';

  // 生涯1度しか受賞できない賞はカウントを1に固定
  const ONE_TIME_AWARDS = new Set(['ROY']);
  Object.keys(countMap).forEach(abbr => {
    if (ONE_TIME_AWARDS.has(abbr)) countMap[abbr] = 1;
  });

  // 優先度順でソート（_AWARD_PRIORITY を使用。MVP が最優先）
  const sorted = Object.entries(countMap)
    .sort((a, b) => (_AWARD_PRIORITY[a[0]] ?? 99) - (_AWARD_PRIORITY[b[0]] ?? 99));
  return sorted.map(([abbr, cnt]) => cnt > 1 ? `${abbr}${cnt}` : abbr).join(' ');
}

/** MLB Stats API からリーグ年度別ランキングを取得（無料・APIキー不要） */
async function fetchLeagueLeaders(year, isPitcher, leagueId) {
  const cats = isPitcher
    ? 'earnedRunAverage,strikeouts,wins,walksAndHitsPerInningPitched,saves,holds'
    : 'battingAverage,homeRuns,runsBattedIn,onBasePlusSlugging,onBasePercentage,stolenBases';
  const statGroup = isPitcher ? 'pitching' : 'hitting';
  // leagueId が指定されていない場合は全MLBで取得（フォールバック）
  const leagueParam = leagueId ? `&leagueId=${leagueId}` : '';
  try {
    const url = `https://statsapi.mlb.com/api/v1/stats/leaders?leaderCategories=${cats}&season=${year}&sportId=1${leagueParam}&statGroup=${statGroup}&limit=30`;
    const res = await fetch(url);
    if (!res.ok) {
      console.warn(`[LeadersAPI] ${year} HTTP ${res.status}`);
      return {};
    }
    const data = await res.json();
    const result = {};
    (data.leagueLeaders || []).forEach(cat => {
      // rank が "T1" "T2" のような文字列に対応（数字部分のみ抽出）
      result[cat.leaderCategory] = (cat.leaders || []).map(l => ({
        rank: (parseInt(String(l.rank).replace(/\D/g, ''), 10) || 99),
        value: l.value,
        personId: l.person?.id,
      }));
    });
    const keys = Object.keys(result);
    const counts = keys.map(k => `${k}:${result[k].length}`).join(', ');
    console.log(`[LeadersAPI] ${year} L=${leagueId} keys=[${counts}]`);
    return result;
  } catch(e) {
    console.warn(`[LeadersAPI] ${year} 例外:`, e.message);
    return {};
  }
}

/**
 * リーグリーダーデータから選手の順位情報を構築
 * localStats: ローカルExcelの統計値 { avg, hr, rbi, ops, era, k, wins, sb, whip }
 *   APIの値とローカル値を比較し乖離が大きい場合はそのカテゴリをスキップ
 */
function buildRankData(leaders, mlbId, leagueLabel, localStats = {}) {
  const result = { leagueLabel };
  const catMap = {
    earnedRunAverage: 'era', strikeouts: 'k', wins: 'wins',
    walksAndHitsPerInningPitched: 'whip',   // API は "whip" でなくこのキーを返す
    saves: 'sv', holds: 'hld',
    battingAverage: 'avg', homeRuns: 'hr', runsBattedIn: 'rbi',
    onBasePlusSlugging: 'ops', onBasePercentage: 'obp', stolenBases: 'sb',
  };

  const leaderKeys = Object.keys(leaders);
  console.log(`[buildRankData] mlbId=${mlbId} availableKeys=[${leaderKeys.join(',')}]`);

  for (const [apiKey, shortKey] of Object.entries(catMap)) {
    const list = leaders[apiKey] || [];
    if (list.length === 0) {
      // APIキー名が期待と異なる可能性 → 大文字小文字無視でフォールバック検索
      const lowerApiKey = apiKey.toLowerCase();
      const altKey = leaderKeys.find(k => k.toLowerCase() === lowerApiKey);
      if (altKey) {
        console.log(`[buildRankData] キー別名ヒット: ${apiKey} → ${altKey}`);
        // 再試行
        const altList = leaders[altKey] || [];
        const altEntry = altList.find(e => Number(e.personId) === Number(mlbId));
        if (altEntry && altEntry.rank <= 10) {
          console.log(`[buildRankData] ${shortKey}(via ${altKey}): rank=${altEntry.rank} val=${altEntry.value}`);
          result[shortKey] = { rank: altEntry.rank, value: altEntry.value };
        }
      } else {
        console.log(`[buildRankData] ${apiKey}: リストなし`);
      }
      continue;
    }

    // personId は JSON では数値として返るが念のため Number() で比較
    const entry = list.find(e => Number(e.personId) === Number(mlbId));
    if (!entry) {
      const top3 = list.slice(0, 3).map(e => `id=${e.personId}(${e.rank})`).join(', ');
      console.log(`[buildRankData] ${shortKey}: 選手未発見 (上位3: ${top3})`);
      continue;
    }
    if (entry.rank > 10) {
      console.log(`[buildRankData] ${shortKey}: rank=${entry.rank} (10位以下のため除外)`);
      continue;
    }

    console.log(`[buildRankData] ${shortKey}: ✓ rank=${entry.rank} val=${entry.value}`);
    result[shortKey] = { rank: entry.rank, value: entry.value };
  }
  return result;
}

/**
 * 前年比較によるキャリア軌跡を分析（g_dataRows を参照）
 * @returns {{ isBreakthrough, isImprovement, isPeakSeason, isFirstYear,
 *             yearsInLeague, prevMetric, curMetric }}
 */
function analyzeCareerTrajectory(currentRow) {
  if (!g_dataRows || g_dataRows.length < 2) return {};
  const curYear = parseInt(currentRow[1]);
  if (isNaN(curYear)) return {};

  const sorted = g_dataRows
    .filter(r => /^\d{4}$/.test(String(r[1] ?? '')))
    .map(r => ({ year: parseInt(r[1]), row: r }))
    .sort((a, b) => a.year - b.year);

  const idx = sorted.findIndex(y => y.year === curYear);
  if (idx < 0) return {};

  const prev        = idx > 0 ? sorted[idx - 1] : null;
  const debutYear   = sorted[0]?.year;
  const yearsInLeague = debutYear ? (curYear - debutYear + 1) : null;
  const isFirstYear = idx === 0;

  if (g_isPitcher) {
    const curERA   = parseFloat(currentRow[5]) || 99;
    const prevERA  = prev ? (parseFloat(prev.row[5]) || 99) : null;
    const improve  = prevERA !== null ? +(prevERA - curERA).toFixed(2) : 0;
    const isPeak   = sorted.every(y => (parseFloat(y.row[5]) || 99) >= curERA);
    return {
      isBreakthrough: prevERA !== null && prevERA >= 4.00 && curERA < 3.00,
      isImprovement:  improve > 0.70 && curERA < 4.00,
      isPeakSeason:   isPeak,
      isFirstYear,
      yearsInLeague,
      prevMetric: prevERA,
      curMetric:  curERA,
    };
  } else {
    const curOPS  = parseFloat(fmtOPS(currentRow[17])) || 0;
    const prevOPS = prev ? (parseFloat(fmtOPS(prev.row[17])) || 0) : null;
    const improve = prevOPS !== null ? +(curOPS - prevOPS).toFixed(3) : 0;
    const isPeak  = sorted.every(y => (parseFloat(fmtOPS(y.row[17])) || 0) <= curOPS);
    return {
      isBreakthrough: prevOPS !== null && prevOPS < 0.750 && curOPS > 0.900,
      isImprovement:  improve > 0.100,
      isPeakSeason:   isPeak,
      isFirstYear,
      yearsInLeague,
      prevMetric: prevOPS,
      curMetric:  curOPS,
    };
  }
}
